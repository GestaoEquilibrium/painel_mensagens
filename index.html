<style>
:root{
  --azul:#1868B0; --azul-2:#0f4d86; --ciano:#50C0D0;
  --bg:#eef1f6; --card:#ffffff; --linha:#e6eaf0;
  --texto:#1e2a3a; --muted:#73808f; --verde:#25D366;
  --sombra:0 1px 2px rgba(16,40,70,.06),0 6px 20px rgba(16,40,70,.06);
  --raio:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg); color:var(--texto); -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}

/* ---------- Layout ---------- */
.app{display:grid;grid-template-columns:264px 1fr;height:100vh;overflow:hidden}

/* ---------- Sidebar ---------- */
.side{
  background:linear-gradient(180deg,var(--azul) 0%,var(--azul-2) 100%);
  color:#fff;display:flex;flex-direction:column;overflow:hidden;
}
.brand{display:flex;align-items:center;gap:12px;padding:22px 20px 18px}
.brand svg{width:46px;height:46px;flex:none}
.brand .nome{line-height:1}
.brand .nome b{font-size:26px;font-weight:700;letter-spacing:-.5px;display:block}
.brand .nome span{font-size:10px;letter-spacing:4px;opacity:.85;display:block;margin-top:2px}
.side .scroll{flex:1;overflow-y:auto;padding:6px 12px 20px}
.side .scroll::-webkit-scrollbar{width:8px}
.side .scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:8px}
.grp{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;opacity:.6;
  margin:18px 12px 8px;font-weight:700}
.navitem{display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;
  color:#eaf3fb;text-align:left;padding:9px 12px;border-radius:10px;font-size:14px;
  margin-bottom:2px;transition:background .15s}
.navitem:hover{background:rgba(255,255,255,.10)}
.navitem.ativo{background:rgba(255,255,255,.18);font-weight:600;box-shadow:inset 3px 0 0 #fff}
.badge{font-size:10px;font-weight:800;letter-spacing:.5px;color:#fff;
  padding:3px 6px;border-radius:6px;flex:none;min-width:34px;text-align:center}
.navitem .cont{margin-left:auto;font-size:11px;opacity:.7;background:rgba(255,255,255,.14);
  padding:1px 7px;border-radius:20px}
.flowicon{width:18px;height:18px;flex:none;opacity:.9}

/* ---------- Topbar ---------- */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:18px;background:#fff;border-bottom:1px solid var(--linha);
  padding:14px 28px;flex:none}
.crumb{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);white-space:nowrap}
.crumb b{color:var(--azul)}
.busca{flex:1;max-width:560px;position:relative}
.busca input{width:100%;border:1px solid var(--linha);background:#f6f8fb;border-radius:12px;
  padding:11px 14px 11px 40px;font-size:14px;outline:none}
.busca input:focus{border-color:var(--ciano);background:#fff}
.busca svg{position:absolute;left:13px;top:11px;width:18px;height:18px;color:var(--muted)}
.user{display:flex;align-items:center;gap:12px;margin-left:auto}
.user .info{text-align:right;line-height:1.2}
.user .info b{font-size:13px;display:block}
.user .info span{font-size:11px;color:var(--muted)}
.user .av{width:38px;height:38px;border-radius:50%;background:var(--ciano);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.btn-dados{border:1px solid var(--linha);background:#fff;border-radius:10px;padding:8px 12px;
  font-size:13px;color:var(--azul);font-weight:600;display:flex;align-items:center;gap:6px}
.btn-dados:hover{background:#f1f6fb}

/* ---------- Conteúdo ---------- */
.content{flex:1;overflow-y:auto;padding:26px 28px 80px}
.eyebrow{color:var(--ciano);font-size:12px;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.h1{font-size:30px;font-weight:700;letter-spacing:-.5px;margin:4px 0 2px}
.sub{color:var(--muted);font-size:14px;margin-bottom:22px}
.sub b{color:var(--azul)}

.cats-titulo{display:flex;align-items:center;gap:10px;margin:0 0 16px}
.cats-titulo .badge{font-size:12px;padding:5px 9px}
.cats-titulo h2{font-size:20px;margin:0;font-weight:700}
.cats-titulo p{margin:0;color:var(--muted);font-size:13px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.balao{background:var(--card);border:1px solid var(--linha);border-radius:var(--raio);
  box-shadow:var(--sombra);overflow:hidden;display:flex;flex-direction:column}
.balao .bar{height:4px}
.balao .cab{display:flex;align-items:center;gap:8px;padding:12px 14px 6px}
.balao .cab .tag{font-size:10px;font-weight:800;letter-spacing:.5px;color:#fff;padding:2px 6px;border-radius:5px}
.balao .cab h3{font-size:14px;margin:0;font-weight:600}
.balao .txt{padding:4px 14px 12px;font-size:13.5px;line-height:1.55;color:#33404f;white-space:pre-wrap;flex:1}
.chip{display:inline-block;background:#eef6fd;color:var(--azul);border:1px dashed #9fc7ea;
  border-radius:6px;padding:0 6px;font-size:12.5px;font-weight:600;outline:none;min-width:30px}
.chip[contenteditable]:focus{background:#fff;border-style:solid;border-color:var(--ciano)}
.chip.preench{background:#e8f7ee;color:#1d7a45;border-color:#9fdcb6;border-style:solid}
.acoes{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--linha);background:#fbfcfe}
.acoes button{flex:1;border:1px solid var(--linha);background:#fff;border-radius:9px;padding:8px;
  font-size:12.5px;font-weight:600;color:var(--azul);display:flex;align-items:center;justify-content:center;gap:6px}
.acoes button:hover{background:#f1f6fb}
.acoes button.ok{background:#e8f7ee;border-color:#bfe6cd;color:#1d7a45}

/* Fluxo */
.fluxo{max-width:760px}
.passo{background:#fff;border:1px solid var(--linha);border-radius:var(--raio);box-shadow:var(--sombra);
  padding:16px 18px;margin-bottom:14px;position:relative}
.passo .n{position:absolute;left:-13px;top:16px;width:26px;height:26px;border-radius:50%;
  background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;box-shadow:0 2px 6px rgba(24,104,176,.4)}
.passo h4{margin:0 0 6px;font-size:15px}
.passo .msg{background:#f3f8fc;border-left:3px solid var(--ciano);padding:9px 12px;border-radius:8px;
  font-size:13.5px;line-height:1.5;white-space:pre-wrap;color:#33404f}
.ramos{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.ramo{font-size:12px;background:#fff;border:1px solid var(--linha);border-radius:20px;padding:4px 12px;color:var(--muted)}
.ramo b{color:var(--texto)}

/* FAB resposta rápida */
.fab{position:fixed;right:26px;bottom:26px;width:62px;height:62px;border-radius:50%;border:0;
  background:var(--verde);color:#fff;box-shadow:0 8px 24px rgba(37,211,102,.45);z-index:40;
  display:flex;align-items:center;justify-content:center}
.fab svg{width:30px;height:30px}
.assistente{position:fixed;right:26px;bottom:100px;width:340px;max-width:calc(100vw - 40px);
  background:#fff;border:1px solid var(--linha);border-radius:16px;box-shadow:0 16px 50px rgba(16,40,70,.22);
  z-index:41;overflow:hidden;display:none}
.assistente.aberto{display:block}
.assistente .h{background:var(--verde);color:#fff;padding:12px 16px;font-weight:600;font-size:14px}
.assistente .b{padding:14px}
.assistente textarea{width:100%;border:1px solid var(--linha);border-radius:10px;padding:10px;
  font-size:13px;resize:vertical;min-height:70px;font-family:inherit}
.assistente .sug{margin-top:10px;max-height:230px;overflow-y:auto}
.assistente .sug button{width:100%;text-align:left;border:1px solid var(--linha);background:#f9fbfd;
  border-radius:9px;padding:9px 11px;margin-bottom:7px;font-size:12.5px}
.assistente .sug button:hover{background:#eef6fd}
.assistente .sug button b{display:block;color:var(--azul);font-size:11px;margin-bottom:2px}

/* Modal onboarding */
.overlay{position:fixed;inset:0;background:rgba(15,42,77,.45);
  display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
.overlay.escondido{display:none}
.modal{background:#fff;border-radius:18px;width:440px;max-width:100%;box-shadow:0 24px 70px rgba(16,40,70,.3);overflow:hidden}
.modal .top{background:linear-gradient(135deg,var(--azul),var(--ciano));color:#fff;padding:22px 24px}
.modal .top svg{width:40px;height:40px;margin-bottom:8px}
.modal .top h2{margin:0;font-size:19px}
.modal .top p{margin:4px 0 0;font-size:13px;opacity:.92}
.modal .form{padding:20px 24px 8px}
.campo{margin-bottom:14px}
.campo label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.3px}
.campo input,.campo select{width:100%;border:1px solid var(--linha);border-radius:10px;padding:11px 12px;
  font-size:14px;outline:none;font-family:inherit;background:#f9fbfd}
.campo input:focus,.campo select:focus{border-color:var(--ciano);background:#fff}
.linha2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal .rodape{padding:8px 24px 22px;display:flex;gap:10px}
.modal .rodape button{flex:1;border:0;border-radius:11px;padding:13px;font-size:14px;font-weight:700}
.modal .rodape .pular{flex:none;background:#f1f4f8;color:var(--muted)}
.modal .rodape .salvar{background:var(--azul);color:#fff}
.modal .rodape .salvar:hover{background:var(--azul-2)}


.logo-tile{width:46px;height:46px;background:#fff;border-radius:13px;flex:none;display:flex;
  align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.18)}
.logo-tile svg{width:36px;height:36px}
.logo-tile img{width:38px;height:38px;display:block}
.wa-wrap{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.wa-phone{width:390px;max-width:100%;border-radius:18px;overflow:hidden;box-shadow:var(--sombra);
  display:flex;flex-direction:column;height:600px;border:1px solid var(--linha)}
.wa-head{background:#008069;color:#fff;padding:12px 14px;display:flex;align-items:center;gap:12px}
.wa-head .av{width:40px;height:40px;border-radius:50%;background:#ffffff33;display:flex;align-items:center;justify-content:center;font-weight:700}
.wa-head .nm{font-weight:600;font-size:15px;line-height:1.1}
.wa-head .st{font-size:11px;opacity:.85}
.wa-clear{background:transparent;border:0;color:#fff;margin-left:auto;font-size:12px;cursor:pointer;opacity:.9}
.wa-clear:hover{opacity:1}
.wa-body{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:8px;background:#efeae2}
.wa-msg{max-width:82%;padding:7px 10px 5px;border-radius:9px;font-size:13.5px;line-height:1.45;white-space:pre-wrap;box-shadow:0 1px 1px rgba(0,0,0,.08)}
.wa-in{background:#fff;align-self:flex-start;border-top-left-radius:2px}
.wa-out{background:#d9fdd3;align-self:flex-end;border-top-right-radius:2px}
.wa-time{font-size:9.5px;color:#667781;text-align:right;margin-top:2px}
.wa-empty{margin:auto;color:#5b6b6a;font-size:13px;text-align:center;max-width:230px}
.wa-input{display:flex;gap:8px;padding:10px;background:#f0f2f5;align-items:flex-end}
.wa-input textarea{flex:1;border:0;border-radius:20px;padding:10px 14px;font-size:13.5px;resize:none;font-family:inherit;outline:none;max-height:120px;background:#fff}
.wa-send{width:44px;height:44px;border-radius:50%;border:0;background:#008069;color:#fff;flex:none;display:flex;align-items:center;justify-content:center}
.wa-send svg{width:20px;height:20px}
.wa-sug{flex:1;min-width:300px;max-width:540px}
.wa-sug h3{font-size:16px;margin:0 0 4px}
.wa-sug .hint{color:var(--muted);font-size:13px;margin-bottom:14px}
.sugcard{background:#fff;border:1px solid var(--linha);border-radius:12px;box-shadow:var(--sombra);padding:12px 14px;margin-bottom:12px;border-left:4px solid var(--azul)}
.sugcard .top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sugcard .tag{font-size:10px;font-weight:800;color:#fff;padding:2px 6px;border-radius:5px}
.sugcard h4{font-size:13.5px;margin:0}
.sugcard .best{margin-left:auto;font-size:10px;font-weight:800;color:#1d7a45;background:#e8f7ee;padding:2px 8px;border-radius:20px}
.sugcard .prev{font-size:12.5px;color:#48586a;line-height:1.45;max-height:84px;overflow:hidden;white-space:pre-wrap;margin-bottom:10px}
.sugcard button{width:100%;border:1px solid #bfe6cd;background:#e8f7ee;color:#1d7a45;border-radius:9px;padding:9px;font-size:13px;font-weight:700}
.sugcard button:hover{background:#008069;color:#fff;border-color:#008069}

.balao-img{max-width:100%;border-radius:10px;margin-top:8px;border:1px solid var(--linha)}
.codechip{font-size:11px;font-weight:800;background:#eef6fd;color:var(--azul);border:1px solid #cfe3f5;border-radius:7px;padding:3px 9px;cursor:pointer}
.codechip:hover{background:var(--azul);color:#fff}
.branch{font-size:10px;font-weight:800;color:#b5701b;background:#fff3e6;padding:2px 7px;border-radius:20px;vertical-align:middle}
.passo h4{display:flex;align-items:center;gap:8px}
.balao.flash{box-shadow:0 0 0 3px var(--ciano);transition:box-shadow .4s}

.prof-meta{padding:2px 14px 0;font-size:12.5px;color:var(--muted)}
.prof-meta b{color:#33404f;font-weight:600}
.prof-dias{display:flex;flex-wrap:wrap;gap:5px;padding:8px 14px 4px}
.diac{font-size:11px;font-weight:700;background:#eef6fd;color:var(--azul);border-radius:6px;padding:2px 7px}
.rqe{font-size:10px;font-weight:800;letter-spacing:.4px;padding:3px 7px;border-radius:20px;margin-left:auto}
.rqe.sim{background:#e8f7ee;color:#1d7a45}
.rqe.nao{background:#fff3e6;color:#b5701b}
.prof-enr{padding:8px 14px 4px;display:grid;gap:6px}
.enr-row{display:flex;align-items:baseline;gap:7px;font-size:12px}
.enr-row .lbl{color:var(--muted);font-weight:700;min-width:74px;flex:none}
.amarelo{background:#fff8df!important;border-color:#e9d27a!important;color:#7a5d12!important}
.vazio{text-align:center;color:var(--muted);padding:60px 20px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--texto);color:#fff;
  padding:11px 20px;border-radius:30px;font-size:13.5px;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:264px;z-index:50;transform:translateX(-100%);transition:transform .25s}
  .side.aberta{transform:translateX(0)}
  .busca{display:none}
  .menu-btn{display:flex!important}
}
.menu-btn{display:none;border:1px solid var(--linha);background:#fff;border-radius:9px;width:40px;height:40px;
  align-items:center;justify-content:center}
</style>

const CATS = [{"id":"PRI","key":"primeiro","cor":"#1B86A6","nome":"Primeiro contato","baloes":[{"code":"PRI-01","t":"Acolhimento inicial — entender a necessidade","x":"Olá! 😊 Para eu te ajudar da melhor forma, posso te fazer algumas perguntinhas rápidas?\n\n• O atendimento é para você ou para outra pessoa (por exemplo, uma criança)?\n• Você já tem alguma indicação ou encaminhamento, ou é uma primeira busca?\n• Pretende usar plano de saúde ou atendimento particular?\n\nCom essas informações eu já te direciono para o profissional certo. 💙","kw":"primeiro contato acolhimento entender necessidade triagem perguntas"},{"code":"PRI-02","t":"Triagem — o que capturar (uso interno)","x":"CHECKLIST DO PRIMEIRO CONTATO (uso interno)\n\n☐ Nome completo do paciente\n☐ Idade / data de nascimento (adulto ou criança)\n☐ Telefone de contato\n☐ Responsável (se for criança)\n☐ Queixa / motivo ou encaminhamento\n☐ Plano de saúde ou particular\n☐ Há urgência emocional? (se sim, ver categoria Sensível)\n☐ Como conheceu a clínica","kw":"triagem checklist dados capturar interno primeiro contato"},{"code":"PRI-03","t":"Triagem — direcionar a especialidade (uso interno)","x":"GUIA RÁPIDO DE DIRECIONAMENTO (uso interno)\n\n• Criança com suspeita de atraso / TEA → Terapia ABA, Terapia Infantil, Fono, TO\n• Dificuldade escolar / aprendizagem → Psicopedagogia + Avaliação Neuropsicológica\n• Suspeita de TDAH / diagnóstico → Avaliação Neuropsicológica + Psiquiatria\n• Ansiedade, depressão, humor → Psiquiatria e/ou Psicologia\n• Fala / linguagem → Fonoaudiologia\n• Coordenação / motricidade → Psicomotricidade / Terapia Ocupacional\n\nNa dúvida, agende uma avaliação inicial e a equipe redireciona.","kw":"triagem direcionar especialidade rota encaminhar interno"}]},{"id":"ATD","key":"atendimento","cor":"#1868B0","nome":"Atendimento","baloes":[{"code":"ATD-01","t":"Saudação / primeiro contato","x":"Olá! 😊 Seja muito bem-vindo(a) à *Equilibrium Med Center*.\n\nMeu nome é *[NOME DO ATENDENTE]* e será um prazer cuidar do seu atendimento por aqui.\n\nComo podemos te ajudar hoje? Você gostaria de:\n\n1️⃣ Agendar uma consulta ou avaliação\n2️⃣ Tirar dúvidas sobre nossas especialidades\n3️⃣ Saber sobre planos de saúde e valores\n4️⃣ Falar sobre um atendimento já agendado\n\nÉ só responder pelo número ou escrever com suas palavras. Estou aqui para te ouvir. 💙","kw":"ola bem vindo inicio menu opcoes"},{"code":"ATD-02","t":"Ausência — fora do horário","x":"Olá! 😊 Obrigado(a) por entrar em contato com a *Equilibrium Med Center*.\n\nNo momento estamos fora do horário de atendimento, mas a sua mensagem é muito importante para nós.\n\n🕐 *Atendemos de [segunda a sexta, das 08h às 18h] e [sábado, das 08h às 12h].*\n\nAssim que retornarmos, um de nossos atendentes vai te responder com toda a atenção. Se preferir, já pode deixar aqui sua dúvida ou solicitação que daremos andamento o quanto antes.\n\nCuide-se. Até breve! 💙","kw":"ausencia fora horario fechado nao atendimento"},{"code":"ATD-03","t":"Ausência — fim de semana / feriado","x":"Olá! 😊 Obrigado(a) pelo seu contato com a *Equilibrium Med Center*.\n\nHoje nosso atendimento não está funcionando, mas voltaremos *[no próximo dia útil / em DATA]* para te responder com todo o cuidado.\n\nPode deixar sua mensagem por aqui — assim que retornarmos, ela será a nossa prioridade.\n\nTenha um ótimo descanso! 💙","kw":"feriado fim de semana domingo sabado"},{"code":"ATD-04","t":"Desculpas — demora curta","x":"Oi, *[NOME DO PACIENTE]*! Aqui é *[NOME DO ATENDENTE]*. 😊\n\nPeço desculpas pela demora em retornar — tivemos um volume maior de atendimentos hoje, mas agora estou totalmente à sua disposição.\n\nObrigado(a) pela paciência! Vamos continuar de onde paramos. 💙","kw":"desculpa demora atraso paciencia"},{"code":"ATD-05","t":"Desculpas — demora maior","x":"Olá, *[NOME DO PACIENTE]*! 😊 Aqui é *[NOME DO ATENDENTE]*, da Equilibrium Med Center.\n\nSinto muito pela demora no retorno. Sua mensagem é importante para nós e não gostaríamos que você esperasse. Já estou cuidando da sua solicitação com prioridade.\n\nVocê ainda precisa de ajuda com *[assunto]*? Estou aqui para resolver isso com você agora. 💙","kw":"desculpa demora muito tempo dia retorno"},{"code":"ATD-06","t":"Apresentação de serviços","x":"Claro! Ficamos felizes com o seu interesse. 😊\n\nNa *Equilibrium Med Center* oferecemos atendimento completo em saúde mental e desenvolvimento, com uma equipe multidisciplinar especializada:\n\n🧠 Psiquiatria (adulto e infantil)\n💬 Psicologia e Psicoterapia\n🧩 Terapia ABA\n📋 Avaliação Neuropsicológica\n🗣️ Fonoaudiologia\n✋ Terapia Ocupacional\n🤸 Psicomotricidade\n📚 Psicopedagogia\n👶 Terapias Infantis\n\nTambém realizamos *diagnóstico e acompanhamento de transtornos neurocognitivos, neurológicos e de humor.*\n\nQuer que eu te explique melhor sobre alguma dessas especialidades ou já podemos pensar em um agendamento? 💙","kw":"servicos especialidades o que fazem equipe"},{"code":"ATD-07","t":"Planos — convênios atendidos","x":"Com prazer! 😊 Trabalhamos com os seguintes convênios:\n\n✅ Unimed Uberlândia\n✅ Unimed Intercâmbio\n✅ GNDI\n✅ Hapvida\n✅ Usisaúde\n✅ GEAP Saúde\n✅ Vitallis\n✅ NDI\n\nPara confirmar a cobertura da especialidade que você procura, posso verificar para você. Qual atendimento você está buscando e qual o seu plano? 💙","kw":"plano convenio unimed hapvida gndi quais atende"},{"code":"ATD-08","t":"Plano não atendido","x":"Agradecemos muito o seu contato! 😊 No momento, ainda não trabalhamos com o convênio *[PLANO]*.\n\nMas temos ótimas condições para *atendimento particular*, e ficaríamos felizes em cuidar de você. Quer que eu te passe os valores e as formas de pagamento?\n\n💳 E temos uma vantagem especial: com o cartão *Equilibrium Mais Saúde* você garante *50% de desconto* nos atendimentos particulares.\n\nSe desejar, também posso verificar a possibilidade de *reembolso* pelo seu plano. 💙","kw":"plano nao atende particular reembolso"},{"code":"ATD-09","t":"Localização","x":"Claro! 😊 Estamos localizados em:\n\n📍 *Avenida Cesário Alvim, 2001 — Bairro Aparecida*\n🗺️ Mapa: https://www.google.com/search?q=equilibrium+medcenter\n\nℹ️ Não dispomos de estacionamento próprio, mas há opções de estacionamento rotativo e particular nas proximidades.\n\nQualquer dificuldade para chegar, é só me chamar que te oriento pelo caminho. 💙","kw":"endereco onde fica local mapa estacionamento chegar"},{"code":"ATD-10","t":"Só um momento","x":"Perfeito! Só um momentinho enquanto verifico essa informação para você. 😊 Já te retorno!","kw":"espera aguarde momento verificar"},{"code":"ATD-11","t":"Transferência para outro setor","x":"Vou te encaminhar para *[SETOR / PESSOA RESPONSÁVEL]*, que vai cuidar dessa solicitação com toda a atenção. 😊\n\nSó um momentinho, por favor. Já retornamos! 💙","kw":"transferir encaminhar setor responsavel"},{"code":"ATD-12","t":"Encerramento / despedida","x":"Foi um prazer te atender, *[NOME DO PACIENTE]*! 😊\n\nQualquer outra dúvida, estaremos sempre por aqui. Conte com a gente para cuidar de você e de quem você ama.\n\nTenha um excelente dia! 💙\n*[NOME DO ATENDENTE]* — Equilibrium Med Center","kw":"despedida tchau encerrar obrigado"},{"code":"ATD-13","t":"Emergência — WhatsApp principal fora do ar","x":"⚠️ *Comunicado — Equilibrium Med Center*\n\nNosso WhatsApp principal está *temporariamente fora do ar*. Para continuar te atendendo, estamos usando um canal alternativo. 💙\n\n📲 *Fale com a gente por aqui:* [NÚMERO ALTERNATIVO]\n\nAtendemos normalmente por este número — agendamentos, confirmações e dúvidas. Assim que o canal principal voltar, avisamos. Obrigado(a) pela compreensão!","kw":"emergencia whatsapp fora do ar contingencia alternativo canal comunicado instavel numero"},{"code":"ATD-14","t":"Setor Financeiro","x":"Claro, será um prazer ajudar! 😊 Para assuntos do *setor financeiro* (pagamentos, recibos, notas ou negociações), vou encaminhar o seu contato para a nossa equipe responsável.\n\nPode me informar o seu *nome completo* e um breve resumo do que precisa? Se preferir registrar por escrito, é só enviar para o e-mail da nossa gestão: gestaoequilibriummedcenter@gmail.com. Cuidaremos do seu atendimento o quanto antes. 💙","kw":"financeiro pagamento recibo nota negociacao cobranca setor falar"},{"code":"ATD-15","t":"RH — Envio de currículo","x":"Que bom saber do seu interesse em fazer parte da nossa equipe! 🌟 Agradecemos muito o contato.\n\nPara se candidatar, envie o seu currículo para o e-mail da nossa gestão: gestaoequilibriummedcenter@gmail.com. Se preferir, pode deixá-lo por aqui mesmo que encaminhamos internamente.\n\nAssim que surgir uma oportunidade alinhada ao seu perfil, entraremos em contato. Desejamos muito sucesso! 💙","kw":"rh recursos humanos curriculo vaga emprego trabalhar candidatura processo seletivo"},{"code":"ATD-16","t":"Falar com a Gestão","x":"Claro! 😊 Para assuntos com a *gestão* da Equilibrium, o nosso canal oficial é o e-mail da nossa *Diretora Clínica, Niela*:\n\n📧 gestaoequilibriummedcenter@gmail.com\n\nPode escrever por lá com toda a tranquilidade — todos os assuntos relacionados à clínica são tratados por esse canal. Se preferir, me passe o seu nome, contato e um resumo que eu encaminho internamente. 💙","kw":"gestao gerencia coordenacao responsavel falar setor administrativo email niela diretora clinica"},{"code":"ATD-17","t":"Falar com o Proprietário (Dr. Wessilon)","x":"Com certeza! 😊 Para falar com o nosso proprietário, *Dr. Wessilon*, vou registrar a sua solicitação e encaminhá-la pessoalmente.\n\nPode me informar o seu *nome completo*, o melhor contato e o assunto que gostaria de tratar? Se preferir deixar por escrito, pode enviar para o e-mail da nossa gestão: gestaoequilibriummedcenter@gmail.com. Garantimos que o seu recado chegue até ele. 💙","kw":"proprietario dono wessilon diretor falar gestao recado"}]},{"id":"DOC","key":"documentos","cor":"#3E7CB1","nome":"Documentos & Guias","baloes":[{"code":"DOC-01","t":"Solicitação de documentos (convênio)","x":"Perfeito! Para darmos andamento ao seu atendimento pelo convênio *[PLANO]*, vamos precisar de alguns documentos. Pode nos enviar por aqui mesmo:\n\n📄 Foto da *carteirinha do plano* (frente e verso)\n🆔 Foto de um *documento com foto* (RG ou CNH)\n📝 *Guia ou pedido médico* de encaminhamento (se já tiver)\n\nAssim que recebermos, nossa equipe verifica a autorização e te retorna com os próximos passos. Pode enviar quando for possível! 💙","kw":"documentos carteirinha rg guia convenio enviar"},{"code":"DOC-02","t":"Orientação sobre guia / encaminhamento","x":"Para *[ESPECIALIDADE / avaliação]*, o seu plano solicita um *pedido médico de encaminhamento*. 📝\n\nEsse pedido é feito pelo seu médico (clínico, pediatra, psiquiatra ou neurologista) e deve conter:\n\n• A solicitação da especialidade ou avaliação\n• O CID (quando houver)\n• Data, assinatura e carimbo do médico\n\nSe você já tiver esse documento, pode nos enviar a foto por aqui. Caso ainda não tenha, posso te orientar sobre como conseguir. 💙","kw":"guia encaminhamento pedido medico cid"},{"code":"DOC-03","t":"Confirmação de recebimento","x":"Recebemos seus documentos, *[NOME DO PACIENTE]*! ✅ Muito obrigado(a).\n\nAgora nossa equipe vai conferir tudo e dar entrada na autorização junto ao convênio. O prazo de retorno costuma ser de *[PRAZO]*.\n\nAssim que tivermos a confirmação, entro em contato para combinarmos o agendamento. Pode ficar tranquilo(a) que vou acompanhar de perto. 💙","kw":"recebemos documentos confirmacao autorizacao prazo"},{"code":"DOC-04","t":"Pendência / documento ilegível","x":"Oi, *[NOME DO PACIENTE]*! 😊 Recebemos seus documentos, obrigado(a)!\n\nSó identificamos uma pendência: a foto da *[carteirinha / guia]* ficou um pouco difícil de ler. Você poderia reenviar com a imagem mais nítida e bem iluminada, por gentileza?\n\nAssim conseguimos dar andamento sem nenhum atraso. 💙","kw":"ilegivel reenviar foto pendencia"},{"code":"DOC-05","t":"Pedido de receita médica","x":"Olá, *[NOME DO PACIENTE]*! 😊 Obrigado(a) pelo seu contato.\n\nSobre a sua solicitação de receita: por se tratar de um cuidado com a sua saúde e segurança, *as receitas são emitidas exclusivamente em consulta, presencialmente, com o médico responsável pelo seu atendimento.*\n\nDessa forma, não realizamos a emissão ou a renovação de receitas por WhatsApp, telefone ou e-mail.\n\nPosso verificar a próxima disponibilidade na agenda do(a) *[PROFISSIONAL]* para você? Assim garantimos que tudo seja feito com toda a atenção que você merece. 💙","kw":"receita renovacao medico presencial"},{"code":"DOC-06","t":"Laudo / documento pronto","x":"Oi, *[NOME DO PACIENTE]*! 😊\n\nSobre a sua solicitação de *[laudo / relatório / documento]*, o prazo de entrega é de *[PRAZO]*. Assim que estiver pronto, entraremos em contato para combinar a retirada ou o envio.\n\nQualquer dúvida nesse período, estamos à disposição. 💙","kw":"laudo relatorio documento prazo retirada"},{"code":"DOC-07","t":"Valores / atendimento particular","x":"Claro! 😊 Os valores variam conforme a especialidade e o tipo de atendimento (sessão avulsa, pacote ou avaliação completa).\n\nPara te passar um valor certinho e adequado à sua necessidade, posso verificar com você:\n\n• Qual atendimento você procura?\n• É para você ou para outra pessoa (por exemplo, uma criança)?\n• Pretende usar plano de saúde ou atendimento particular?\n\nCom essas informações, te envio os valores atualizados e as formas de pagamento. 💙\n\n💳 *Dica:* com o cartão *Equilibrium Mais Saúde* você tem *50% de desconto* nos atendimentos particulares. Se quiser, te explico como funciona!","kw":"valor preco particular quanto custa pagamento"},{"code":"DOC-08","t":"Dados do PIX (CNPJ)","x":"Segue a nossa chave PIX para o pagamento. 💙\n\n🔑 *Chave PIX (CNPJ):* 34.032.586/0001-98\n🏥 *Favorecido:* Equilibrium Med Center\n🏦 *Instituição:* Mercado Pago\n\n📲 Você também pode pagar escaneando o QR Code que vou te enviar.\n\nAssim que fizer o PIX, por gentileza me envie o comprovante para eu confirmar o seu pagamento. Qualquer dúvida, estou à disposição! 😊","kw":"pix cnpj chave pagamento mercado pago comprovante transferencia particular qr code qrcode","img":"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAbgAAAGnCAAAAADgIR0hAACTQ0lEQVR42uy9d6AtWVUm/q21965zw0ud6YRNE7olCkgyoIA6IsafghlFxzFhBB1kDJgzOsyYM2BAhxETBkQEQSUoNJIz3TTddHr53ntq772+3x+76pyqc+qce+7r+5rGeeeP926lXat2WHvFbwlx7nd3+bVjISvcK+cG7mPz589gQpz7naWfnIWB47nFeRcOIHcfwyWjQQEIipzryY/SlpdVhBQBZQ8DR4BQAJZSzomZGYDxHM88u/uWKJxT57w6BTIUhMieVlz2sO3t0xFUdSIiAPTc+ju7UiVBmtGMUvmNAx4mg1xv2YqT+thJC5sbXv254bpLfyagjbfr7bx+4Rr2xiopdvuxtUObfkCgPMcqz7JU2S4xbh8/PbpojVRSdxu4RibRnZvyRYfPdeZH+7d9+855F3Be0BxecaQe//CRix3PsciP9q4nOPaRg/dQiukKA2d67KZLj5jg3MB9dPc6hdFt3+wvdbLaHnfiw5cdAM6pcB/tBScEIPXNcsWsXUUH1+fOzfc4RC2i/zlJ5KMprYiIsLo03To7DgMDZ8w3HTpCd67f7jYLz1969LTuOnDQW+xiO9ddd591J7J2wU2228BRt09dohA7p7PdPZYbAfACf/uuA4dj6weg7V54TkD5qK83gJDzTiTSlg2cphOHemr8ud9Hf/AMB/SEdNXqgT1uWw6e66q728hlv3myt5gGBu7EITknmtz99LnNGJXLBs521s+xybvdz3MkO1i6xyVW5/rpbiigeL+znFUmhnxuxd0Nf2GMpawyunNu07vjNoeQl604Irpz8Vx3R24Jx7xk4ASmOOeGu/utN4HPPXV77p6s5/rpbvnrL6gBdeCcW+Du+XO0pcIJBTingN8td7muVOmHVtzAFmd6x6PqPQotIX7lT6TuCz71eiVD/ILndc6afvbb1eDT43+ncza71z3ZJ7j86BclJ0j+a1/h8pxSmn75Sckju/d/eoeyEH/mS5PfE6GU8aOOKhni1/1Q59HkX/zdIc6/9bN/bXH7yX/Fa3yCyy96dHbI7o1fOE/3br32o08dbF+syyr94IobJOk9e58kH+l7hd5/IwDgpv7ZD14PALix/+h2OXt5szd/6Pqh9k82Gkz/4vG9+6L43lMAgBlH84nBt354afsNpVu9z9jT79jCFYelA7dAqpS1va+4GRvMmio5d3akavBpNLMVq09weTS5aWjFNdSL9lacPwM+tL6lZIhh5g06tOKWW5ZGhXBtP2PvK84vEk6WD9zC/c1sjwNnNnM/rcRXz521+XthZpDJWdq85Xv6TJey+ZZWo3WYNLNdvwoDz0yJtb1a7Je0T+zCKgWUBSxTqeB+yC40oWhhAdL2OwGDm51I0r7QgZxjU8zNpqwQslzl7NIBaGqTxAeCXJwF0d7KQZYo0On5rDabTjEU0yiKlrRl0oeKLQg5EBDSa0FX3uNaoVR0X+wqbJa2QlsiBAKyP+EIOBErf1HmshgEYk0PU5qGiMFIp9zpEyIvIy23xojBJJeuUJ7QX1EyyLEUK8WAiKkzWSJVLhVOdtECQ80VRm73NSkgYQJTiIvNREdG8r2ZY8yO5glxoBL9HYM0pTQjJqLltZnGue/P7fbOhh0tnqBCMLuSUlaYQXd6S3fmE0iOnaaSk6HF4CS7XXuN4mxlj9oeB07yxa+quKttJT3y1l33w1R9zn84A/S2kIQJ//BxFKiMX/KI7Ka9/e/3yWoYbf3cr2eHunrLk3Q6JxK+5ZkUhPqqD0KAnbVn/X5VI+IHf4qS5wbjvFd agendado:\n\n🩺 *Especialidade:* [ESPECIALIDADE]\n👩‍⚕️ *Profissional:* [PROFISSIONAL]\n📅 *Data:* [DATA]\n🕐 *Horário:* [HORÁRIO]\n📍 *Local:* Avenida Cesário Alvim, 2001 — Bairro Aparecida\n\nPedimos que chegue com *15 minutos de antecedência*. Se surgir algum imprevisto, é só nos avisar com antecedência para reorganizarmos sua agenda.\n\nEstamos te esperando! 💙","kw":"confirmado agendado horario data marcado"},{"code":"AGE-03","t":"Lembrete de consulta","x":"Oi, *[NOME DO PACIENTE]*! 😊 Passando para lembrar do seu atendimento:\n\n📅 *[DATA]* às 🕐 *[HORÁRIO]*\n👩‍⚕️ com *[PROFISSIONAL]*\n📍 Avenida Cesário Alvim, 2001 — Bairro Aparecida\n\nPodemos confirmar sua presença? Responda com:\n✅ *SIM*, confirmado\n🔄 *Preciso remarcar*\n\nEstamos à disposição! 💙","kw":"lembrete lembrar confirmar presenca amanha"},{"code":"AGE-04","t":"Reagendamento","x":"Sem problemas, *[NOME DO PACIENTE]*! Imprevistos acontecem. 😊\n\nVamos encontrar um novo horário que funcione melhor para você. Quais dias e períodos ficam bons na sua semana?\n\nAssim que me disser, verifico a disponibilidade e já deixo tudo reorganizado. 💙","kw":"remarcar reagendar trocar horario imprevisto"},{"code":"AGE-05","t":"Cancelamento","x":"Entendido, *[NOME DO PACIENTE]*. Seu atendimento do dia *[DATA]* foi cancelado conforme solicitado.\n\nSem problema algum — quando quiser retomar, estaremos de portas abertas para te receber.\n\nCuide-se! 💙","kw":"cancelar cancelamento desmarcar"},{"code":"AGE-06","t":"Agradecimento — desistência","x":"Tudo bem, *[NOME DO PACIENTE]*! 😊 Agradecemos muito por nos avisar.\n\nEntendemos perfeitamente, e sua decisão é sempre respeitada. A Equilibrium Med Center estará de portas abertas no momento em que você decidir cuidar de você — sem qualquer compromisso.\n\nFoi um prazer conversar com você. Conte com a gente sempre que precisar. 💙","kw":"desistencia desistir agradecimento respeito"},{"code":"AGE-07","t":"Agradecimento — após remarcação","x":"Prontinho, *[NOME DO PACIENTE]*! ✅ Seu atendimento foi remarcado:\n\n📅 *Nova data:* [DATA] às 🕐 *[HORÁRIO]*\n👩‍⚕️ com *[PROFISSIONAL]*\n\nObrigado(a) pela compreensão e por nos avisar com antecedência — isso nos ajuda muito a organizar a agenda e a atender você e os demais pacientes da melhor forma.\n\nEstamos te esperando! 💙","kw":"remarcado nova data agradecimento compreensao"},{"code":"AGE-08","t":"Primeira consulta — orientações","x":"Para a sua primeira consulta, queremos que você se sinta acolhido(a) e tranquilo(a). 😊 Algumas orientações:\n\n📄 Leve um documento com foto e a carteirinha do plano (se for usar convênio)\n📝 Traga exames, laudos ou relatórios anteriores, caso tenha\n⏰ Chegue com 15 minutos de antecedência\n👶 No caso de atendimento infantil, é importante que um responsável esteja presente\n\nNão precisa se preocupar com mais nada — nossa equipe vai te orientar em cada passo. 💙","kw":"primeira consulta o que levar preparar documentos"},{"code":"AGE-09","t":"Encaixe — oferta ao paciente","x":"Oi, *[NOME DO PACIENTE]*! 😊 Aqui é *[NOME DO ATENDENTE]*, da Equilibrium Med Center.\n\nConsegui um *encaixe* na agenda do(a) *[PROFISSIONAL]*: *[DATA]* às *[HORÁRIO]*. 💙\n\nPor ser um encaixe, esse horário é limitado — me confirma o quanto antes que eu garanto para você. Posso reservar?","kw":"encaixe espremido vaga horario extra surgiu confirmar agendar disponibilidade"},{"code":"AGE-10","t":"Agenda fechada — sem novos agendamentos","x":"Oi, *[NOME DO PACIENTE]*! 😊 Obrigado(a) pela compreensão.\n\nNo momento, a agenda do(a) *[PROFISSIONAL]* está *temporariamente fechada para novos agendamentos*.\n\nPara não te deixar sem opção, posso:\n✅ Te colocar na *lista de espera* e avisar assim que liberar um horário;\n🔄 Verificar a agenda de *outro(a) profissional* da mesma especialidade.\n\nQual prefere? Estou à disposição. 💙","kw":"agenda fechada medico lotada cheia sem vaga novos agendamentos lista espera"},{"code":"AGE-11","t":"Confirmação de consulta (envio)","x":"Olá, *[NOME DO PACIENTE]*! ✅ Sua consulta está confirmada:\n\n🩺 *Especialidade:* [ESPECIALIDADE]\n👩‍⚕️ *Profissional:* [PROFISSIONAL]\n📅 *Data:* [DATA]\n🕐 *Horário:* [HORÁRIO]\n📍 *Local:* Avenida Cesário Alvim, 2001 — Bairro Aparecida\n\nPedimos que chegue com 15 minutos de antecedência. Se precisar remarcar, é só nos avisar. Até lá! 💙","kw":"confirmacao consulta confirmar enviar presenca especialidade data hora profissional"},{"code":"AGE-12","t":"Confirmação de sessão de psicoterapia","x":"Oi, *[NOME DO PACIENTE]*! 😊 Passando para confirmar sua sessão de psicoterapia:\n\n👩‍⚕️ *Profissional:* [PROFISSIONAL]\n📅 *Data:* [DATA]\n🕐 *Horário:* [HORÁRIO]\n📍 Avenida Cesário Alvim, 2001 — Bairro Aparecida\n\nChegue uns 10 minutinhos antes. Se precisar remarcar, me avise com antecedência — assim consigo reorganizar sua agenda com cuidado. Tudo certo para te receber! 💙","kw":"sessao psicoterapia psicologia confirmar confirmacao terapia data hora profissional"},{"code":"AGE-13","t":"Desmarcação pela clínica — imprevisto do profissional","x":"Olá, *[NOME DO PACIENTE]*! 💙 Aqui é *[NOME DO ATENDENTE]*, da Equilibrium Med Center.\n\nPreciso te avisar, com bastante pesar, que tivemos um imprevisto pessoal com o(a) *[PROFISSIONAL]* e, por isso, não será possível manter a sua consulta marcada para *[DATA]* às *[HORÁRIO]*. 😔\n\nSentimos muito pelo transtorno. Já podemos reagendar para a primeira data disponível, no melhor horário para você. Qual período costuma ser mais fácil — manhã ou tarde? Vou cuidar disso com prioridade. 🙏","kw":"desmarcacao desmarcar cancelar clinica imprevisto profissional problema pessoal reagendar"},{"code":"AGE-14","t":"Desmarcação — Psiquiatria (consultar reagendamento)","x":"Olá, *[NOME DO PACIENTE]*! 💙 Aqui é *[NOME DO ATENDENTE]*, da Equilibrium Med Center.\n\nTivemos um imprevisto pessoal com o(a) *[PROFISSIONAL]* e, infelizmente, precisaremos desmarcar a sua consulta de psiquiatria de *[DATA]* às *[HORÁRIO]*. Sentimos muito pelo transtorno. 😔\n\nVocê tem interesse em *reagendar*? Se sim, é só me avisar que eu já verifico a próxima data disponível com o(a) *[PROFISSIONAL]* — ou, se preferir, com outro de nossos médicos. Fico no aguardo para cuidar disso com você. 🙏","kw":"desmarcacao psiquiatria imprevisto profissional medico reagendar interesse cancelar problema pessoal"},{"code":"AGE-15","t":"Desmarcação por evento nacional/mundial","x":"Olá, *[NOME DO PACIENTE]*! 💙 Aqui é *[NOME DO ATENDENTE]*, da Equilibrium Med Center.\n\nInformamos que, em razão de *[EVENTO]* (por exemplo, um jogo da Copa do Mundo), a clínica *não terá expediente* em *[DATA]*. Por isso, a sua consulta marcada para *[HORÁRIO]* precisará ser remarcada.\n\nSentimos muito pelo imprevisto. Já podemos reagendar para a próxima data disponível, no melhor horário para você. Qual período prefere — manhã ou tarde? Cuidaremos disso com prioridade. 🙏","kw":"desmarcar evento nacional mundial copa do mundo jogo feriado expediente operacao remarcar fechado"},{"code":"AGE-16","t":"Reagendamento — Neuropsicologia (resposta)","x":"Bom dia, *[NOME DO PACIENTE]*! 😊 Imagina, fique tranquilo(a) — imprevistos acontecem. 💙\n\nJá registrei aqui o cancelamento da sua sessão de hoje e vamos cuidar do seu reagendamento.\n\nComo a *avaliação neuropsicológica* é feita em etapas, o ideal é remarcarmos o quanto antes para mantermos a continuidade do processo. Tenho estas opções:\n\n📅 *[OPÇÃO 1 — DIA E HORÁRIO]*\n📅 *[OPÇÃO 2 — DIA E HORÁRIO]*\n📅 *[OPÇÃO 3 — DIA E HORÁRIO]*\n\nQual fica melhor para você? Assim que confirmar, já deixo sua nova sessão agendada com *[PROFISSIONAL]*. 🤝","kw":"reagendar remarcar neuropsicologia neuro avaliacao sessao imprevisto nao posso comparecer nao vou conseguir comparecer continuidade etapas processo paciente"},{"code":"AGE-17","t":"Reagendamento — Neuropsicologia (verificar agenda)","x":"Perfeito, *[NOME DO PACIENTE]*! 😊 Vou verificar a agenda do(a) *[PROFISSIONAL]* e já te retorno com as melhores opções de dia e horário.\n\nFique tranquilo(a): garantimos a continuidade da sua avaliação neuropsicológica, sem perder o andamento do processo. 💙\n\nEm instantes te trago as opções. 🤝","kw":"reagendar remarcar neuropsicologia neuro verificar agenda retornar consultar disponibilidade sessao avaliacao opcoes continuidade"}]},{"id":"ESP","key":"especialidades","cor":"#6D4FA8","nome":"Especialidades","baloes":[{"code":"ESP-01","t":"Avaliação Neuropsicológica","x":"Com prazer em explicar! 😊 A *Avaliação Neuropsicológica* é um processo detalhado que investiga funções como atenção, memória, raciocínio, linguagem e funções executivas.\n\nCostuma ser indicada para auxiliar no diagnóstico de condições como TDAH, dificuldades de aprendizagem, transtornos do desenvolvimento, entre outras.\n\n📋 *Como funciona:*\n• É realizada em algumas sessões (geralmente de 4 a 8 encontros)\n• Inclui entrevista, aplicação de testes e devolutiva com laudo\n• Pode ser feita por plano ou particular\n• No particular, pode ser parcelada em até 3x no cartão de crédito\n\nQuer que eu verifique a cobertura pelo seu convênio ou te passe os valores particulares? 💙","kw":"neuropsicologica avaliacao tdah laudo testes parcelar parcelamento 3x valor"},{"code":"ESP-02","t":"Terapia ABA","x":"Claro! 😊 A *Terapia ABA* (Análise do Comportamento Aplicada) é uma das abordagens mais reconhecidas no acompanhamento de crianças com Transtorno do Espectro Autista (TEA) e outras condições do desenvolvimento.\n\nEla trabalha o desenvolvimento de habilidades de comunicação, socialização, autonomia e comportamento, sempre com um plano individualizado para cada paciente.\n\nNossa equipe multidisciplinar acompanha de perto a evolução de cada criança, em parceria com a família.\n\nQuer saber como iniciar o acompanhamento ou sobre a cobertura pelo seu plano? 💙","kw":"aba autismo tea crianca desenvolvimento"},{"code":"ESP-03","t":"Psiquiatria","x":"Claro! 😊 Na *Psiquiatria*, nosso médico realiza a avaliação, o diagnóstico e o acompanhamento de questões como ansiedade, depressão, transtornos de humor, TDAH, entre outros.\n\nO atendimento é totalmente individualizado e sigiloso, sempre respeitando o seu tempo e a sua história.\n\nAtendemos *adultos e crianças* e trabalhamos de forma integrada com nossa equipe de psicologia e terapias. Quer que eu verifique a disponibilidade de agenda para você? 💙","kw":"psiquiatria psiquiatra medico ansiedade depressao"},{"code":"ESP-04","t":"Psiquiatra (RQE) × médico que atende psiquiatria","x":"Antes de seguir com o agendamento, deixo uma informação importante, com toda a transparência. 💙\n\nAqui na Equilibrium, o atendimento em Psiquiatria pode ser feito por dois tipos de profissional:\n\n🩺 *Médico Psiquiatra (com RQE)* — tem o título de especialista em Psiquiatria registrado no conselho.\nSão eles: *Dr. Luan Souza, Dr. Vitor Tapias, Dr. Wellington e Dr. Marcus.*\n\n🩺 *Médico que atende em Psiquiatria* — médico que realiza o atendimento psiquiátrico, prática autorizada pelo CFM, mas que não possui o título de especialista (RQE).\n\nOs dois cuidam de você com toda a atenção — a escolha é totalmente sua. Você prefere agendar com um *psiquiatra (RQE)* ou quer ver os horários disponíveis entre todos os médicos? 😊","kw":"psiquiatra rqe especialista diferenca esclarecer medico atende psiquiatria titulo cfm transparencia"}]},{"id":"REA","key":"reativacao","cor":"#C68A1E","nome":"Reativação","baloes":[{"code":"REA-01","t":"Pós-avaliação — converter em terapia","x":"Oi, *[NOME DO PACIENTE/RESPONSÁVEL]*! 😊 Aqui é *[NOME DO ATENDENTE]*, da Equilibrium Med Center.\n\nEstou passando para saber como você está depois da avaliação que concluímos por aqui. 💙\n\nComo foram identificados alguns pontos que podem ser bem trabalhados com acompanhamento, nossa equipe gostaria de te apoiar nessa próxima etapa, no seu tempo e sem pressa.\n\nQuer que eu te explique as opções de acompanhamento e veja um horário que caiba na sua rotina? Se preferir, podemos só conversar sobre as dúvidas primeiro. Estou à disposição.","kw":"reativar pos avaliacao terapia continuidade"},{"code":"REA-02","t":"Retomar tratamento interrompido","x":"Olá, *[NOME DO PACIENTE]*! 😊 Aqui é *[NOME DO ATENDENTE]*, da Equilibrium Med Center.\n\nFaz um tempinho que não nos falamos e lembramos de você por aqui. Sem nenhuma cobrança — a vida fica corrida e tudo bem. 💙\n\nQuando e se você quiser retomar o seu acompanhamento, estaremos de portas abertas para te receber, com o mesmo cuidado de sempre.\n\nPosso verificar um horário para você? Ou, se preferir, é só me dizer como podemos te ajudar agora.","kw":"reativar retomar tratamento parou faltou sumiu"},{"code":"REA-03","t":"Check-in de manutenção (pós-alta)","x":"Oi, *[NOME DO PACIENTE]*! 😊 Aqui é *[NOME DO ATENDENTE]*, da Equilibrium Med Center.\n\nPassando só para saber como você tem estado desde que concluímos o seu acompanhamento. 💙\n\nSe estiver tudo bem, ficamos muito felizes! E, caso sinta que seria bom retomar ou fazer uma conversa de acompanhamento, é só me chamar — estaremos sempre por aqui para você.\n\nCuide-se!","kw":"reativar pos alta check-in bem estar"},{"code":"REA-04","t":"Reativação leve (inativos)","x":"Olá, *[NOME DO PACIENTE]*! 😊 Aqui é a equipe da Equilibrium Med Center.\n\nEstamos passando para deixar um carinho e lembrar que continuamos por aqui, com nossa equipe multidisciplinar pronta para cuidar de você e da sua família sempre que precisar. 💙\n\nSe quiser saber das novidades, tirar uma dúvida ou agendar um horário, é só responder esta mensagem.\n\nSe preferir não receber mais este tipo de contato, basta nos avisar que respeitamos com todo o cuidado. 🤝","kw":"reativar inativo arquivado tempo carinho"},{"code":"REA-05","t":"Encaminhamento interno entre especialidades","x":"Oi, *[NOME DO PACIENTE/RESPONSÁVEL]*! 😊 Aqui é *[NOME DO ATENDENTE]*.\n\nConversando com a equipe que acompanha *[você / o(a) NOME]*, foi sugerido que um trabalho conjunto com *[ESPECIALIDADE]* poderia somar bastante aos resultados que já estamos construindo. 💙\n\nÉ um cuidado complementar, feito de forma integrada aqui mesmo na Equilibrium, para você não precisar se preocupar com nada.\n\nQuer que eu te explique como funciona e veja a disponibilidade? Sem compromisso — só para você conhecer a proposta.","kw":"encaminhamento interno especialidade complementar"},{"code":"REA-06","t":"Resgate de cancelamento (lista de espera)","x":"Oi, *[NOME DO PACIENTE]*! 😊 Aqui é *[NOME DO ATENDENTE]*, da Equilibrium Med Center.\n\nTenho uma boa notícia: abriu um horário com *[PROFISSIONAL]* em *[DATA]* às *[HORÁRIO]*. Lembrei de você que estava aguardando! 💙\n\nEsse horário funciona para você? Se sim, já reservo agora mesmo. Como é por ordem de contato, é só me confirmar que garanto para você.","kw":"vaga abriu horario lista de espera resgate"},{"code":"REA-07","t":"Segundo lembrete leve","x":"Oi, *[NOME DO PACIENTE]*! 😊 Passei por aqui há alguns dias e não quis deixar de te dar um último alô.\n\nSem nenhuma pressa — sempre que você quiser, estaremos prontos para te receber na Equilibrium Med Center. 💙\n\nSe este não for um bom momento, tudo bem! Pode me chamar quando fizer sentido para você.","kw":"segundo lembrete sem resposta ultimo alo"}]},{"id":"FBK","key":"feedback","cor":"#2E9E8F","nome":"Feedback","baloes":[{"code":"FBK-01","t":"Elogio — agradecimento","x":"Que alegria receber o seu carinho! 😊💙 Muito obrigado(a) por compartilhar isso com a gente.\n\nVou repassar o seu elogio para toda a equipe da Equilibrium — comentários como o seu nos motivam a cuidar cada vez melhor de você e da sua família.\n\nSe precisar de qualquer coisa, é só chamar. Estamos sempre por aqui! 🌟","kw":"elogio agradecimento feedback positivo carinho obrigado parabens otimo gratidao"},{"code":"FBK-02","t":"Sugestão — acolhimento","x":"Muito obrigado(a) pela sua sugestão! 🙏 A sua opinião é muito importante para nós.\n\nVou registrar e encaminhar para a nossa equipe avaliar com carinho — é assim que conseguimos melhorar a cada dia.\n\nAgradecemos por nos ajudar a evoluir. Conte sempre conosco! 💙","kw":"sugestao ideia melhoria feedback opiniao recomendacao proposta"},{"code":"FBK-03","t":"Reclamação — acolhimento e encaminhamento","x":"Sinto muito que a sua experiência não tenha sido como esperávamos. 💙 Agradeço por nos contar — levamos isso a sério.\n\nVou registrar o ocorrido e encaminhar para a nossa coordenação analisar com atenção e te retornar o quanto antes.\n\nPara nos ajudar a resolver da melhor forma, pode me dar mais alguns detalhes (data, profissional ou situação)? Obrigado(a) pela confiança em nos avisar.","kw":"reclamacao reclamar insatisfacao problema queixa feedback negativo coordenacao insatisfeito"},{"code":"FBK-04","t":"Convite para avaliação no Google","x":"Foi um prazer cuidar de você! 💙 Se a sua experiência na Equilibrium foi positiva, você nos ajudaria muito deixando uma avaliação no Google. ⭐\n\nÉ rapidinho, leva menos de 1 minuto:\n👉 https://g.page/r/CVq0oQK8oq7HEAE/review\n\nA sua opinião fortalece o nosso trabalho e ajuda outras famílias a encontrarem a gente. Muito obrigado(a)! 🌟","kw":"avaliacao google review estrelas opiniao recomendar nota link"},{"code":"FBK-05","t":"Reclamação — recebida e em tratativa (devolutiva)","x":"Obrigado(a) por nos trazer isso. 💙 A sua reclamação foi *recebida* e será *tratada com toda a atenção* pela nossa equipe.\n\nVamos analisar o ocorrido com cuidado e *retornaremos para você com uma devolutiva* assim que concluirmos a apuração.\n\nAgradecemos pela confiança em nos avisar — é assim que conseguimos melhorar cada vez mais o nosso atendimento. 🙏","kw":"reclamacao queixa recebida tratada devolutiva retorno apuracao insatisfacao quero reclamar"}]},{"id":"CAR","key":"cartao","cor":"#CB6B4A","nome":"Cartão & Vendas","baloes":[{"code":"CAR-01","t":"Cartão — pitch de abertura","x":"Posso te apresentar uma forma de cuidar da sua saúde mental gastando bem menos? 😊\n\nO *Equilibrium Mais Saúde* é o nosso programa de descontos: com uma mensalidade acessível, você tem *50% de desconto* nos atendimentos particulares da clínica — psicoterapia, psiquiatria, terapias infantis e mais.\n\nNão é plano de saúde nem convênio: é um clube de benefícios da própria Equilibrium, pensado para quem quer continuidade no cuidado pagando menos. Quer que eu te mostre a conta? 💙","kw":"cartao mais saude desconto apresentar oferta"},{"code":"CAR-02","t":"Cartão — frase de impacto (economia)","x":"Olha só: o plano *Individual* custa *R$ 59 por mês*.\n\nEm *uma única consulta psiquiátrica*, você já economiza *R$ 250* — ou seja, mais de 4 meses de mensalidade pagos de uma vez. 💙\n\nE se você faz acompanhamento contínuo, a economia se multiplica todo mês.","kw":"economia conta vale a pena consulta paga"},{"code":"CAR-03","t":"Cartão — plano Individual","x":"Para quem vai cuidar de si mesmo, o plano *Individual* é o ideal: *R$ 59/mês* e 50% de desconto em todos os atendimentos.\n\nSe você pretende fazer acompanhamento, ele se paga sozinho logo na primeira consulta. Quer começar? 💙","kw":"cartao individual 59 titular"},{"code":"CAR-04","t":"Cartão — plano Mais Família","x":"Se o cuidado é para a família, o plano *Mais Família* cobre você + até 3 pessoas (total de 4), por *R$ 99/mês*.\n\nÉ a opção mais escolhida por casais e por famílias com filhos em terapia, porque o desconto de 50% vale para todos os titulares do cartão. Quer que eu monte para a sua família? 💙","kw":"cartao mais familia 99 dependentes casal"},{"code":"CAR-05","t":"Cartão — plano Gran Família","x":"Para famílias maiores, temos o *Gran Família*: até 6 pessoas (titular + 5), por *R$ 119/mês*.\n\nQuando há mais de um filho em acompanhamento, costuma ser a escolha mais econômica de todas. Posso te explicar como incluir cada pessoa? 💙","kw":"cartao gran familia 119 seis pessoas"},{"code":"CAR-06","t":"Cartão — vantagens (multa zero)","x":"E o melhor: o *Equilibrium Mais Saúde* não te prende. 😊\n\n✅ *Multa zero* para cancelar\n✅ Após 12 meses, prazo indeterminado — *sem nova fidelidade*\n✅ Tabela de preços transparente, sempre à vista\n✅ Direito de arrependimento garantido\n\nVocê fica porque vale a pena, não porque é obrigado(a). 💙","kw":"multa zero fidelidade cancelar arrependimento"},{"code":"CAR-07","t":"Objeção — “É plano de saúde?”","x":"Ótima pergunta! 😊 Não, não é plano de saúde nem convênio. É um *programa de descontos* da própria Equilibrium: você paga uma mensalidade e ganha 50% de desconto nos nossos atendimentos particulares. Os atendimentos continuam sendo particulares — só que com um preço muito menor para você. 💙","kw":"objecao plano de saude convenio nao"},{"code":"CAR-08","t":"Objeção — “Está caro”","x":"Entendo! 😊 Vamos fazer a conta juntos: quantos atendimentos você costuma fazer por mês? Em quase todos os casos, a economia de uma ou duas consultas já cobre a mensalidade inteira — o resto do mês é economia pura para você. 💙","kw":"objecao caro compensa conta"},{"code":"CAR-09","t":"Objeção — “Vou pensar”","x":"Claro, fique à vontade! 😊 Posso te deixar a tabelinha de valores e a simulação de economia para você analisar com calma? Quando quiser, é só me chamar que reservo tudo para você sem compromisso. 💙","kw":"objecao vou pensar depois tabela simulacao"},{"code":"CAR-10","t":"Objeção — “Já tenho convênio”","x":"Que bom! 😊 O cartão pode te ajudar justamente naquilo que o convênio não cobre ou tem fila — como algumas terapias, pacotes infantis ou avaliações. Muita gente usa os dois de forma complementar. Quer que eu te mostre onde ele mais compensa para o seu caso? 💙","kw":"objecao ja tenho convenio complementar fila"},{"code":"CAR-11","t":"Objeção — Avaliação neuropsicológica (elegibilidade)","x":"A avaliação neuropsicológica, que é particular R$ 3.800, sai por *R$ 1.900* com o cartão. 😊\n\nPor ser um serviço de alto valor, esse desconto integral tem uma *condição de elegibilidade*: vale para quem está há 180 dias com as mensalidades em dia *ou* para quem opta pela quitação anual antecipada. Os demais atendimentos já têm 50% desde a adesão. Quer que eu te explique qual caminho compensa mais para você? 💙","kw":"objecao neuropsicologica elegibilidade 180 dias quitacao anual"},{"code":"CAR-12","t":"Objeção — “Tem fidelidade?”","x":"Pode ficar tranquilo(a)! 😊 *Multa zero* e, depois dos 12 primeiros meses, o cartão segue por prazo indeterminado, sem nenhuma nova fidelidade. Você permanece só enquanto fizer sentido para você. 💙","kw":"objecao fidelidade multa cancelar prazo"},{"code":"CAR-13","t":"Cartão — fechamento","x":"Então vamos garantir o seu *Equilibrium Mais Saúde*? 😊\n\nPara a adesão, eu vou precisar de:\n👤 Seus dados (e dos dependentes, se for plano familiar)\n📄 A escolha do plano: Individual, Mais Família ou Gran Família\n💳 A forma de pagamento da mensalidade\n\nEm poucos minutos você já começa a economizar no seu próximo atendimento. Posso seguir com o seu cadastro? 💙","kw":"fechamento adesao cadastro garantir"},{"code":"CAR-14","t":"B2B — abordagem RH","x":"Olá! 😊 Sou da *Equilibrium Mais Saúde*. Trabalhamos com um programa que pode ser um benefício valioso e de baixo custo para a sua equipe.\n\nA empresa oferece aos funcionários *50% de desconto* em atendimentos de saúde mental — psicoterapia, psiquiatria e mais — a partir de *R$ 25 por funcionário/mês*.\n\nÉ um cuidado real com o bem-estar do time, que ajuda inclusive na produtividade e na retenção de talentos. Posso preparar uma proposta para o porte da sua empresa? 💙","kw":"empresa b2b rh funcionarios beneficio corporativo"},{"code":"CAR-15","t":"B2B — argumento de valor","x":"Saúde mental é hoje uma das principais causas de afastamento no trabalho. Oferecer acesso facilitado a cuidado, com 50% de desconto, é um investimento que retorna em presença, engajamento e clima organizacional — por um custo mensal muito acessível por colaborador. 💙","kw":"empresa argumento afastamento produtividade clima"},{"code":"CAR-16","t":"Cartão — adesão (link online)","x":"Perfeito! A adesão é online e leva poucos minutos. 😊\n\nÉ só acessar o link, escolher o plano, cadastrar o titular (e os dependentes, no caso do plano familiar) e finalizar o pagamento:\n\n🔗 https://maisequilibriumsaude.com.br/\n\n🪪 Tenha em mãos *CPF* e *data de nascimento* de cada pessoa do cartão\n💳 Pagamento por *cartão de crédito* (mensal) ou *PIX* (à vista)\n\nAssim que concluir, seu cartão já fica ativo e você começa a economizar no próximo atendimento. Qualquer dúvida no caminho, é só me chamar. 💙","kw":"aderir adesao link site online cadastro como assinar contratar cartao mais saude pagamento pix cartao de credito titular dependentes"},{"code":"CAR-17","t":"Cartão — abertura com apresentação","x":"Olá! 😊 Aqui é o(a) *[NOME DO ATENDENTE]*, da *Equilibrium Med Center*.\n\nTudo bem? Passando para te apresentar uma novidade que pode ajudar você e a sua família a cuidar da saúde gastando bem menos: o nosso *Cartão Equilibrium Mais Saúde*. 💙\n\nÉ um clube de benefícios da própria clínica, com até *50% de desconto* nos atendimentos particulares — e não é plano de saúde nem convênio.\n\nPosso te explicar rapidinho como funciona? 😊","kw":"abertura apresentacao cartao mais saude ola eu sou novidade apresentar oferecer clube beneficios proativo bom dia"}]},{"id":"ADM","key":"admin","cor":"#64748B","nome":"Administrativo","baloes":[{"code":"ADM-01","t":"Dados da clínica (uso interno)","x":"DADOS PARA GUIAS E NOTAS (uso interno)\n\nRazão social: EQUILIBRIUM MED CENTER LTDA\nCNPJ: 34.032.586/0001-98\nEndereço: Avenida Cesário Alvim, 2001 — Bairro Aparecida, Uberlândia/MG\nE-mail da gestão: gestaoequilibriummedcenter@gmail.com\nDiretora Clínica: Niela\nProprietário: Dr. Wessilon","kw":"cnpj razao social dados clinica nota guia endereco interno"},{"code":"ADM-02","t":"Convênios atendidos (referência)","x":"CONVÊNIOS ATENDIDOS\n\nUnimed Uberlândia · Unimed Intercâmbio · GNDI · Hapvida · Usisaúde · GEAP Saúde · Vitallis · NDI","kw":"convenios planos referencia lista admin unimed hapvida gndi"},{"code":"ADM-03","t":"Formas de pagamento","x":"FORMAS DE PAGAMENTO\n\nAtendimento particular e cartão Equilibrium Mais Saúde.\nPagamento: PIX, cartão de débito, cartão de crédito e boleto.\n\nParcelamento:\n• Consultas médicas — NÃO são parceladas (à vista).\n• Avaliação neuropsicológica — em até 3x no cartão de crédito.\n• Terapias infantis — parceláveis conforme o pacote contratado.","kw":"pagamento pix debito credito boleto formas parcelamento parcelar parcela 3x admin"},{"code":"ADM-04","t":"Horário de funcionamento","x":"HORÁRIO DE FUNCIONAMENTO\n\nSegunda a sexta: [08h às 18h]\nSábado: [08h às 12h]\n[Confirmar / ajustar os horários reais da clínica.]","kw":"horario funcionamento aberto expediente admin"},{"code":"ADM-05","t":"Prazos internos & regra de retorno","x":"PRAZOS & REGRA DE CONSULTA\n\n🔁 Retorno / nova consulta (todos os planos):\n• NÃO realizamos retorno antes de 30 dias.\n• A volta do paciente é sempre CONSULTA NOVA, agendada somente após 30 dias da anterior.\n• Cada atendimento tem guia própria — o paciente nunca volta na mesma guia já executada.\n\nAutorização de convênio: [a confirmar]\nEntrega de documentos / laudo / relatório: 3 a 5 dias úteis (organização do arquivo, cópias e assinatura do termo de recebimento).","kw":"prazo retorno 30 dias nova consulta guia executada reaproveitar convenio autorizacao laudo entrega admin referencia"}]},{"id":"PRO","key":"profissionais","cor":"#A8497A","nome":"Profissionais","baloes":[{"code":"PRO-01","t":"Aline — Fonoaudiologia","x":"Aline — Fonoaudiologia\n📍 Unidade 2 · 1º andar · Sala(s): S14\n📅 Dias: Seg-Ter-Qua-Qui-Sex\n🕐 Turnos: Manhã (P1), Tarde (P2), Fim de tarde (P3)\n⏰ Horários de início: 8h30, 13h, 16h\n(3 turnos/semana)","kw":"atende agenda equipe aline profissional fonoaudiologia"},{"code":"PRO-02","t":"Hugo — Fonoaudiologia","x":"Hugo — Fonoaudiologia\n📍 Unidade 2 · 1º andar · Sala(s): S13\n📅 Dias: Seg-Ter-Qua-Qui-Sex\n🕐 Turnos: Manhã (P1), Tarde (P2), Fim de tarde (P3)\n⏰ Horários de início: 7h45, 13h, 16h\n(3 turnos/semana)","kw":"atende agenda equipe hugo profissional fonoaudiologia"},{"code":"PRO-03","t":"Lara function fillPlain(txt){return txt.replace(/\[([^\]]+)\]/g,(m,tok)=>{const k=TOKENMAP[tok.trim().toUpperCase()];return (k&&CTX[k])?CTX[k]:'['+tok.trim()+']';});}

function preencher(txt){
  let s=esc(txt);
  s=s.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/\[([^\]]+)\]/g,(m,tok)=>{
    const key=TOKENMAP[tok.trim().toUpperCase()];
    if(key && CTX[key]) return '<span class="chip preench">'+esc(CTX[key])+'</span>';
    return '<span class="chip" contenteditable="true" spellcheck="false" data-token="'+esc(tok.trim())+'">'+esc(tok.trim())+'</span>';
  });
  return s;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function gerarProf(btn){
  const c=btn.closest('.balao');
  const nome=c.dataset.nome, esp=c.dataset.esp, uni=c.dataset.uni, andar=c.dataset.andar,
        salas=c.dataset.salas, dias=c.dataset.dias, rqe=c.dataset.rqe;
  const get=(f,ph)=>{const el=c.querySelector('[data-field='+f+']');const v=el?el.textContent.trim():'';
    return (v && v!==ph)?v:'{'+ph+'}';};
  let m='Para '+esp+', temos '+nome+'. 😊\n';
  m+='Atendimento: '+uni+(andar?' – '+andar:'')+(salas?', '+salas:'')+'.\n';
  if(dias) m+='Dias: '+dias+'.\n';
  if(esp==='Psiquiatria'){
    if(rqe==='true') m+='Possui título de especialista em Psiquiatria (RQE).\n';
    else if(rqe==='false') m+='Atua na área como médico(a), sem título de especialista — a escolha é sempre sua.\n';
  }
  m+='Convênios: '+get('conv','convênios')+'. Quer que eu verifique os próximos horários?';
  navigator.clipboard.writeText(m).then(()=>{
    const o=btn.innerHTML;btn.classList.add('ok');btn.innerHTML='✅ Copiado!';
    toast('Apresentação de '+nome+' copiada');
    setTimeout(()=>{btn.classList.remove('ok');btn.innerHTML=o;},1700);
  });
}

function copiar(id,btn,isFlux){
  const el=document.getElementById(isFlux?id:('txt-'+id));
  let txt=textoLimpo(el);
  navigator.clipboard.writeText(txt).then(()=>{
    btn.classList.add('ok');const o=btn.innerHTML;btn.innerHTML='✅ Copiado!';
    toast('Mensagem copiada');
    setTimeout(()=>{btn.classList.remove('ok');btn.innerHTML=o;},1600);
  });
}
function textoLimpo(el){
  const clone=el.cloneNode(true);
  clone.querySelectorAll('.chip').forEach(ch=>{
    let out;
    if(ch.classList.contains('preench')) out=ch.textContent.trim();
    else { const tok=ch.dataset.token||ch.textContent.trim(); const v=ch.textContent.trim(); out=(v&&v!==tok)?v:'['+tok+']'; }
    ch.replaceWith(document.createTextNode(out));
  });
  return clone.textContent;
}

function toggleAssist(){document.getElementById('assist').classList.toggle('aberto');}
function sugerir(txt){
  txt=txt.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const out=document.getElementById('assistSug'); out.innerHTML='';
  if(txt.trim().length<3)return;
  const palavras={'remarc':'AGE','desmarc':'AGE','cancel':'AGE','horario':'AGE','agendar':'AGE','confirm':'AGE','encaixe':'AGE',
    'valor':'CAR','preco':'CAR','particular':'CAR','desconto':'CAR','cartao':'CAR',
    'convenio':'DOC','guia':'DOC','documento':'DOC','laudo':'DOC','atestado':'DOC','receita':'DOC',
    'neuro':'ESP','avalia':'ESP','psicolog':'ESP','especialidade':'ESP',
    'feedback':'FBK','avaliacao google':'FBK',
    'falt':'SEN','reclam':'SEN','crise':'SEN','urgencia':'SEN'};
  const ids=new Set();
  Object.keys(palavras).forEach(k=>{if(txt.includes(k))ids.add(palavras[k]);});
  let achou=[];
  (ids.size?[...ids]:CATS.map(c=>c.id)).forEach(cid=>{
    const cat=CATS.find(c=>c.id===cid);if(!cat)return;
    cat.baloes.forEach(b=>achou.push({cat,b}));
  });
  achou.slice(0,6).forEach(({cat,b})=>{
    const btn=document.createElement('button');
    btn.innerHTML='<b>'+cat.id+' · '+esc(cat.nome)+'</b>'+esc(b.t);
    btn.onclick=()=>{
      navigator.clipboard.writeText(fillPlain(b.x));toast('Balão copiado: '+b.t);
    };
    out.appendChild(btn);
  });
  if(!achou.length)out.innerHTML='<div style="font-size:12px;color:#73808f">Nenhum balão correspondente.</div>';
}

let waChat=[]; let waLast=[];
const WA_STOP=new Set('a o os as um uma de da do das dos para por e em que no na nos nas com sem meu minha seu sua ao aos pra pro me te se isso isto esse essa esta este quero queria gostaria preciso pode posso poderia voce vc ola oi bom boa dia tarde noite obrigado obrigada favor sim nao tem ter qual quais como quando onde aqui ja tudo'.split(' '));
function waNorm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function matchBaloes(text){
  const toks=[...new Set(waNorm(text).replace(/[^a-z0-9 ]+/g,' ').split(/\s+/).filter(t=>t.length>=3 && !WA_STOP.has(t)))];
  if(!toks.length) return [];
  const res=[];
  CATS.forEach(cat=>cat.baloes.forEach(b=>{
    const kw=waNorm(b.kw||''), ti=waNorm(b.t), bo=waNorm(b.x);
    let s=0;
    toks.forEach(t=>{ if(kw.includes(t)) s+=3; if(ti.includes(t)) s+=2; if(bo.includes(t)) s+=1; });
    if(s>0) res.push({cat,b,s});
  }));
  res.sort((a,b)=>b.s-a.s || a.b.code.localeCompare(b.b.code));
  return res.slice(0,5);
}
function waAgora(){const d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function renderWhats(){
  document.getElementById('crumb').textContent='Simulador WhatsApp';
  const c=document.getElementById('content');
  c.innerHTML=
   '<div class="eyebrow">Atendimento</div><div class="h1">Simulador de WhatsApp 💬</div>'+
   '<div class="sub">Cole a mensagem do paciente e o painel sugere a melhor resposta entre os '+CATS.reduce((s,c)=>s+c.baloes.length,0)+' balões. Toque em <b>Usar resposta</b> para enviar e copiar.</div>'+
   '<div class="wa-wrap">'+
     '<div class="wa-phone">'+
       '<div class="wa-head"><span class="av">P</span><div><div class="nm">Paciente</div><div class="st">online</div></div><button class="wa-clear" onclick="waLimpar()">Limpar conversa</button></div>'+
       '<div class="wa-body" id="waBody"></div>'+
       '<div class="wa-input"><textarea id="waInput" rows="1" placeholder="Cole aqui a mensagem do WhatsApp do paciente"></textarea>'+
         '<button class="wa-send" onclick="waEnviar()" title="Analisar mensagem"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button></div>'+
     '</div>'+
     '<div class="wa-sug"><h3>Melhores respostas</h3><div class="hint" id="waHint">Aguardando a mensagem do paciente…</div><div id="waSug"></div></div>'+
   '</div>';
  waRenderBody();
  const ta=document.getElementById('waInput');
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();waEnviar();}});
  ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px';});
  if(waLast.length) waPintarSug();
}
function waRenderBody(){
  const body=document.getElementById('waBody'); if(!body)return;
  if(!waChat.length){body.innerHTML='<div class="wa-empty">Cole a primeira mensagem do paciente para começar a análise.</div>';return;}
  body.innerHTML=waChat.map(m=>'<div class="wa-msg '+(m.from==='in'?'wa-in':'wa-out')+'">'+esc(m.text)+'<div class="wa-time">'+m.t+'</div></div>').join('');
  body.scrollTop=body.scrollHeight;
}
function waEnviar(){
  const ta=document.getElementById('waInput'); const v=(ta.value||'').trim(); if(!v)return;
  waChat.push({from:'in',text:v,t:waAgora()});
  ta.value=''; ta.style.height='auto';
  waRenderBody();
  waLast=matchBaloes(v);
  waPintarSug();
}
function waPintarSug(){
  const hint=document.getElementById('waHint'), sug=document.getElementById('waSug'); if(!sug)return;
  if(!waLast.length){hint.textContent='Não encontrei um balão específico. Tente termos como “remarcar”, “valor”, “guia”, “laudo”, “cartão”…'; sug.innerHTML=''; return;}
  hint.textContent='Sugestões para a última mensagem (toque para enviar e copiar):';
  sug.innerHTML=waLast.map((r,i)=>{
    const filled=fillPlain(r.b.x);
    const prev=esc(filled.slice(0,170))+(filled.length>170?'…':'');
    return '<div class="sugcard" style="border-left-color:'+r.cat.cor+'">'+
      '<div class="top"><span class="tag" style="background:'+r.cat.cor+'">'+r.b.code+'</span><h4>'+esc(r.b.t)+'</h4>'+(i===0?'<span class="best">melhor opção</span>':'')+'</div>'+
      '<div class="prev">'+prev+'</div>'+
      '<button onclick="waUsar('+i+')">Usar resposta</button></div>';
  }).join('');
}
function waUsar(i){
  const r=waLast[i]; if(!r)return;
  const filled=fillPlain(r.b.x);
  waChat.push({from:'out',text:filled,t:waAgora()});
  waRenderBody();
  navigator.clipboard.writeText(filled).then(()=>toast('Resposta enviada e copiada')).catch(()=>toast('Resposta enviada'));
}
function waLimpar(){waChat=[];waLast=[];waRenderBody();const h=document.getElementById('waHint');if(h)h.textContent='Aguardando a mensagem do paciente…';const s=document.getElementById('waSug');if(s)s.innerHTML='';}

/* ====================== MODAL ====================== */
function abrirModal(){
  document.getElementById('fAtendente').value=CTX.atendente;
  document.getElementById('fPaciente').value=CTX.paciente;
  document.getElementById('fProfissional').value=CTX.profissional;
  document.getElementById('fEspecialidade').value=CTX.especialidade;
  document.getElementById('fData').value=CTX.data;
  document.getElementById('fHora').value=CTX.hora;
  document.getElementById('overlay').classList.remove('escondido');
}
function fecharModal(){document.getElementById('overlay').classList.add('escondido');}
function salvarDados(){
  CTX={
    atendente:document.getElementById('fAtendente').value.trim(),
    paciente:document.getElementById('fPaciente').value.trim(),
    profissional:document.getElementById('fProfissional').value.trim(),
    especialidade:document.getElementById('fEspecialidade').value.trim(),
    data:document.getElementById('fData').value.trim(),
    hora:document.getElementById('fHora').value.trim()
  };
  try{localStorage.setItem('equi_ctx',JSON.stringify(CTX));}catch(e){}
  atualizaUser();fecharModal();render();toast('Dados aplicados aos balões');
}
function atualizaUser(){
  document.getElementById('uNome').textContent=CTX.atendente||'Recepção';
  document.getElementById('uEsp').textContent=CTX.especialidade||'—';
  document.getElementById('uAv').textContent=(CTX.atendente||'R').trim().charAt(0).toUpperCase();
}

/* ====================== TOAST ====================== */
let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}

/* ====================== INIT ====================== */
atualizaUser();
render();
// Abre o onboarding na primeira vez (sem dados salvos)
if(!CTX.atendente && !CTX.profissional){ abrirModal(); }
else { document.getElementById('overlay').classList.add('escondido'); }
</script>
</body>
</html>
