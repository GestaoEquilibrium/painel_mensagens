<style>
:root{
  --azul:#1868B0; --azul-2:#0f4d86; --ciano:#50C0D0;
  --bg:#eef1f6; --card:#ffffff; --linha:#e6eaf0;
  --texto:#1e2a3a; --muted:#73808f; --verde:#25D366;
  --sombra:0 1px 2px rgba(16,40,70,.06),0 6px 20px rgba(16,40,70,.06);
  --raio:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg); color:var(--texto); -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}

/* ---------- Layout ---------- */
.app{display:grid;grid-template-columns:264px 1fr;height:100vh;overflow:hidden}

/* ---------- Sidebar ---------- */
.side{
  background:linear-gradient(180deg,var(--azul) 0%,var(--azul-2) 100%);
  color:#fff;display:flex;flex-direction:column;overflow:hidden;
}
.brand{display:flex;align-items:center;gap:12px;padding:22px 20px 18px}
.brand svg{width:46px;height:46px;flex:none}
.brand .nome{line-height:1}
.brand .nome b{font-size:26px;font-weight:700;letter-spacing:-.5px;display:block}
.brand .nome span{font-size:10px;letter-spacing:4px;opacity:.85;display:block;margin-top:2px}
.side .scroll{flex:1;overflow-y:auto;padding:6px 12px 20px}
.side .scroll::-webkit-scrollbar{width:8px}
.side .scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:8px}
.grp{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;opacity:.6;
  margin:18px 12px 8px;font-weight:700}
.navitem{display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;
  color:#eaf3fb;text-align:left;padding:9px 12px;border-radius:10px;font-size:14px;
  margin-bottom:2px;transition:background .15s}
.navitem:hover{background:rgba(255,255,255,.10)}
.navitem.ativo{background:rgba(255,255,255,.18);font-weight:600;box-shadow:inset 3px 0 0 #fff}
.badge{font-size:10px;font-weight:800;letter-spacing:.5px;color:#fff;
  padding:3px 6px;border-radius:6px;flex:none;min-width:34px;text-align:center}
.navitem .cont{margin-left:auto;font-size:11px;opacity:.7;background:rgba(255,255,255,.14);
  padding:1px 7px;border-radius:20px}
.flowicon{width:18px;height:18px;flex:none;opacity:.9}

/* ---------- Topbar ---------- */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:18px;background:#fff;border-bottom:1px solid var(--linha);
  padding:14px 28px;flex:none}
.crumb{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);white-space:nowrap}
.crumb b{color:var(--azul)}
.busca{flex:1;max-width:560px;position:relative}
.busca input{width:100%;border:1px solid var(--linha);background:#f6f8fb;border-radius:12px;
  padding:11px 14px 11px 40px;font-size:14px;outline:none}
.busca input:focus{border-color:var(--ciano);background:#fff}
.busca svg{position:absolute;left:13px;top:11px;width:18px;height:18px;color:var(--muted)}
.user{display:flex;align-items:center;gap:12px;margin-left:auto}
.user .info{text-align:right;line-height:1.2}
.user .info b{font-size:13px;display:block}
.user .info span{font-size:11px;color:var(--muted)}
.user .av{width:38px;height:38px;border-radius:50%;background:var(--ciano);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.btn-dados{border:1px solid var(--linha);background:#fff;border-radius:10px;padding:8px 12px;
  font-size:13px;color:var(--azul);font-weight:600;display:flex;align-items:center;gap:6px}
.btn-dados:hover{background:#f1f6fb}

/* ---------- Conteúdo ---------- */
.content{flex:1;overflow-y:auto;padding:26px 28px 80px}
.eyebrow{color:var(--ciano);font-size:12px;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.h1{font-size:30px;font-weight:700;letter-spacing:-.5px;margin:4px 0 2px}
.sub{color:var(--muted);font-size:14px;margin-bottom:22px}
.sub b{color:var(--azul)}

.cats-titulo{display:flex;align-items:center;gap:10px;margin:0 0 16px}
.cats-titulo .badge{font-size:12px;padding:5px 9px}
.cats-titulo h2{font-size:20px;margin:0;font-weight:700}
.cats-titulo p{margin:0;color:var(--muted);font-size:13px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.balao{background:var(--card);border:1px solid var(--linha);border-radius:var(--raio);
  box-shadow:var(--sombra);overflow:hidden;display:flex;flex-direction:column}
.balao .bar{height:4px}
.balao .cab{display:flex;align-items:center;gap:8px;padding:12px 14px 6px}
.balao .cab .tag{font-size:10px;font-weight:800;letter-spacing:.5px;color:#fff;padding:2px 6px;border-radius:5px}
.balao .cab h3{font-size:14px;margin:0;font-weight:600}
.balao .txt{padding:4px 14px 12px;font-size:13.5px;line-height:1.55;color:#33404f;white-space:pre-wrap;flex:1}
.chip{display:inline-block;background:#eef6fd;color:var(--azul);border:1px dashed #9fc7ea;
  border-radius:6px;padding:0 6px;font-size:12.5px;font-weight:600;outline:none;min-width:30px}
.chip[contenteditable]:focus{background:#fff;border-style:solid;border-color:var(--ciano)}
.chip.preench{background:#e8f7ee;color:#1d7a45;border-color:#9fdcb6;border-style:solid}
.acoes{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--linha);background:#fbfcfe}
.acoes button{flex:1;border:1px solid var(--linha);background:#fff;border-radius:9px;padding:8px;
  font-size:12.5px;font-weight:600;color:var(--azul);display:flex;align-items:center;justify-content:center;gap:6px}
.acoes button:hover{background:#f1f6fb}
.acoes button.ok{background:#e8f7ee;border-color:#bfe6cd;color:#1d7a45}

/* Fluxo */
.fluxo{max-width:760px}
.passo{background:#fff;border:1px solid var(--linha);border-radius:var(--raio);box-shadow:var(--sombra);
  padding:16px 18px;margin-bottom:14px;position:relative}
.passo .n{position:absolute;left:-13px;top:16px;width:26px;height:26px;border-radius:50%;
  background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;box-shadow:0 2px 6px rgba(24,104,176,.4)}
.passo h4{margin:0 0 6px;font-size:15px}
.passo .msg{background:#f3f8fc;border-left:3px solid var(--ciano);padding:9px 12px;border-radius:8px;
  font-size:13.5px;line-height:1.5;white-space:pre-wrap;color:#33404f}
.ramos{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.ramo{font-size:12px;background:#fff;border:1px solid var(--linha);border-radius:20px;padding:4px 12px;color:var(--muted)}
.ramo b{color:var(--texto)}

/* FAB resposta rápida */
.fab{position:fixed;right:26px;bottom:26px;width:62px;height:62px;border-radius:50%;border:0;
  background:var(--verde);color:#fff;box-shadow:0 8px 24px rgba(37,211,102,.45);z-index:40;
  display:flex;align-items:center;justify-content:center}
.fab svg{width:30px;height:30px}
.assistente{position:fixed;right:26px;bottom:100px;width:340px;max-width:calc(100vw - 40px);
  background:#fff;border:1px solid var(--linha);border-radius:16px;box-shadow:0 16px 50px rgba(16,40,70,.22);
  z-index:41;overflow:hidden;display:none}
.assistente.aberto{display:block}
.assistente .h{background:var(--verde);color:#fff;padding:12px 16px;font-weight:600;font-size:14px}
.assistente .b{padding:14px}
.assistente textarea{width:100%;border:1px solid var(--linha);border-radius:10px;padding:10px;
  font-size:13px;resize:vertical;min-height:70px;font-family:inherit}
.assistente .sug{margin-top:10px;max-height:230px;overflow-y:auto}
.assistente .sug button{width:100%;text-align:left;border:1px solid var(--linha);background:#f9fbfd;
  border-radius:9px;padding:9px 11px;margin-bottom:7px;font-size:12.5px}
.assistente .sug button:hover{background:#eef6fd}
.assistente .sug button b{display:block;color:var(--azul);font-size:11px;margin-bottom:2px}

/* Modal onboarding */
.overlay{position:fixed;inset:0;background:rgba(15,42,77,.45);
  display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
.overlay.escondido{display:none}
.modal{background:#fff;border-radius:18px;width:440px;max-width:100%;box-shadow:0 24px 70px rgba(16,40,70,.3);overflow:hidden}
.modal .top{background:linear-gradient(135deg,var(--azul),var(--ciano));color:#fff;padding:22px 24px}
.modal .top svg{width:40px;height:40px;margin-bottom:8px}
.modal .top h2{margin:0;font-size:19px}
.modal .top p{margin:4px 0 0;font-size:13px;opacity:.92}
.modal .form{padding:20px 24px 8px}
.campo{margin-bottom:14px}
.campo label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.3px}
.campo input,.campo select{width:100%;border:1px solid var(--linha);border-radius:10px;padding:11px 12px;
  font-size:14px;outline:none;font-family:inherit;background:#f9fbfd}
.campo input:focus,.campo select:focus{border-color:var(--ciano);background:#fff}
.linha2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal .rodape{padding:8px 24px 22px;display:flex;gap:10px}
.modal .rodape button{flex:1;border:0;border-radius:11px;padding:13px;font-size:14px;font-weight:700}
.modal .rodape .pular{flex:none;background:#f1f4f8;color:var(--muted)}
.modal .rodape .salvar{background:var(--azul);color:#fff}
.modal .rodape .salvar:hover{background:var(--azul-2)}


.logo-tile{width:46px;height:46px;background:#fff;border-radius:13px;flex:none;display:flex;
  align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.18)}
.logo-tile svg{width:36px;height:36px}
.logo-tile img{width:38px;height:38px;display:block}
.prof-meta{padding:2px 14px 0;font-size:12.5px;color:var(--muted)}
.prof-meta b{color:#33404f;font-weight:600}
.prof-dias{display:flex;flex-wrap:wrap;gap:5px;padding:8px 14px 4px}
.diac{font-size:11px;font-weight:700;background:#eef6fd;color:var(--azul);border-radius:6px;padding:2px 7px}
.rqe{font-size:10px;font-weight:800;letter-spacing:.4px;padding:3px 7px;border-radius:20px;margin-left:auto}
.rqe.sim{background:#e8f7ee;color:#1d7a45}
.rqe.nao{background:#fff3e6;color:#b5701b}
.prof-enr{padding:8px 14px 4px;display:grid;gap:6px}
.enr-row{display:flex;align-items:baseline;gap:7px;font-size:12px}
.enr-row .lbl{color:var(--muted);font-weight:700;min-width:74px;flex:none}
.amarelo{background:#fff8df!important;border-color:#e9d27a!important;color:#7a5d12!important}
.vazio{text-align:center;color:var(--muted);padding:60px 20px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--texto);color:#fff;
  padding:11px 20px;border-radius:30px;font-size:13.5px;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:264px;z-index:50;transform:translateX(-100%);transition:transform .25s}
  .side.aberta{transform:translateX(0)}
  .busca{display:none}
  .menu-btn{display:flex!important}
}
.menu-btn{display:none;border:1px solid var(--linha);background:#fff;border-radius:9px;width:40px;height:40px;
  align-items:center;justify-content:center}
</style>
</head>

/* ====================== ESTADO/RENDER ====================== */
let atual = {tipo:'cat', id:CATS[0].id};

function preencher(txt){
  return txt.replace(/\{([^}]+)\}/g, (m,campo)=>{
    const k = campo.trim().toLowerCase();
    const map={atendente:'atendente',profissional:'profissional',especialidade:'especialidade',data:'data',hora:'hora'};
    if(map[k] && CTX[map[k]]){
      return '<span class="chip preench">'+esc(CTX[map[k]])+'</span>';
    }
    return '<span class="chip" contenteditable="true" spellcheck="false">'+esc(campo.trim())+'</span>';
  });
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function navSidebar(){
  const nc=document.getElementById('navCats'); nc.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='navitem'+(atual.tipo==='cat'&&atual.id===c.id?' ativo':'');
    b.innerHTML='<span class="badge" style="background:'+c.cor+'">'+c.id+'</span>'+c.nome+
      '<span class="cont">'+c.baloes.length+'</span>';
    b.onclick=()=>{atual={tipo:'cat',id:c.id};render();fechaMenuMobile();};

  });
  const nf=document.getElementById('navFlows'); nf.innerHTML='';
  FLOWS.forEach(f=>{
    const b=document.createElement('button');
    b.className='navitem'+(atual.tipo==='flow'&&atual.id===f.id?' ativo':'');

    b.onclick=()=>{atual={tipo:'equipe',id:g.esp};render();fechaMenuMobile();};

}
function fechaMenuMobile(){document.getElementById('side').classList.remove('aberta');}

        '<div class="enr-row"><span class="lbl">Bio</span><span class="chip amarelo" contenteditable spellcheck="false" data-field="bio">breve descrição</span></div>'+
      '</div>'+
      '<div class="acoes"><button onclick="gerarProf(this)">💬 Gerar apresentação</button></div>'+
    '</div>';
  });
  html+='</div>';
  return html;
}

function gerarProf(btn){
  const c=btn.closest('.balao');
  const nome=c.dataset.nome, esp=c.dataset.esp, uni=c.dataset.uni, andar=c.dataset.andar,
        salas=c.dataset.salas, dias=c.dataset.dias, rqe=c.dataset.rqe;
  const get=(f,ph)=>{const el=c.querySelector('[data-field='+f+']');const v=el?el.textContent.trim():'';
    return (v && v!==ph)?v:'{'+ph+'}';};
  let m='Para '+esp+', temos '+nome+'. 😊\n';
  m+='Atendimento: '+uni+(andar?' – '+andar:'')+(salas?', '+salas:'')+'.\n';
  if(dias) m+='Dias: '+dias+'.\n';
  if(esp==='Psiquiatria'){
    if(rqe==='true') m+='Possui título de especialista em Psiquiatria (RQE).\n';
    else if(rqe==='false') m+='Atua na área como médico(a), sem título de especialista — a escolha é sempre sua.\n';
  }
  m+='Convênios: '+get('conv','convênios')+'. Quer que eu verifique os próximos horários?';
  navigator.clipboard.writeText(m).then(()=>{
    const o=btn.innerHTML;btn.classList.add('ok');btn.innerHTML='✅ Copiado!';
    toast('Apresentação de '+nome+' copiada');
    setTimeout(()=>{btn.classList.remove('ok');btn.innerHTML=o;},1700);
  });
}

function copiar(id,btn,isFlux){
  const el=document.getElementById(isFlux?id:('txt-'+id));
  let txt=textoLimpo(el);
  navigator.clipboard.writeText(txt).then(()=>{
    btn.classList.add('ok');const o=btn.innerHTML;btn.innerHTML='✅ Copiado!';
    toast('Mensagem copiada');
    setTimeout(()=>{btn.classList.remove('ok');btn.innerHTML=o;},1600);
  });
}
function textoLimpo(el){
  const clone=el.cloneNode(true);
  clone.querySelectorAll('.chip').forEach(ch=>{
    const v=ch.textContent.trim();
    ch.replaceWith(document.createTextNode(ch.classList.contains('preench')?v:'{'+v+'}'));
  });
  return clone.textContent.replace(/\*/g,'*');
}

/* ====================== BUSCA ====================== */
function buscar(q){
  q=q.trim().toLowerCase();
  if(atual.tipo!=='cat'){ if(q) {/* opcional */} }
  document.querySelectorAll('.balao').forEach(b=>{
    b.style.display = (!q || b.dataset.busca.includes(q)) ? '' : 'none';
  });
}

/* ====================== ASSISTENTE ====================== */
function toggleAssist(){document.getElementById('assist').classList.toggle('aberto');}
function sugerir(txt){
  txt=txt.toLowerCase();
  const out=document.getElementById('assistSug'); out.innerHTML='';
  if(txt.trim().length<3)return;
  const palavras={'remarc':'AGE','desmarc':'SEN','cancel':'SEN','horário':'AGE','horario':'AGE',
    'valor':'PRO','preço':'PRO','preco':'PRO','particular':'PRI','convênio':'PRI','convenio':'PRI',
    'documento':'DOC','laudo':'DOC','atestado':'DOC','receita':'DOC','neuro':'PRO','cartão':'CAR',
    'cartao':'CAR','desconto':'CAR','avalia':'FBK','confirm':'AGE','faltei':'SEN','não fui':'SEN'};
  const ids=new Set();
  Object.keys(palavras).forEach(k=>{if(txt.includes(k))ids.add(palavras[k]);});
  let achou=[];
  (ids.size?[...ids]:CATS.map(c=>c.id)).forEach(cid=>{
    const cat=CATS.find(c=>c.id===cid);if(!cat)return;
    cat.baloes.forEach(b=>achou.push({cat,b}));
  });
  achou.slice(0,6).forEach(({cat,b})=>{
    const btn=document.createElement('button');
    btn.innerHTML='<b>'+cat.id+' · '+esc(cat.nome)+'</b>'+esc(b.t);
    btn.onclick=()=>{
      let raw=b.x.replace(/\{([^}]+)\}/g,(m,c)=>{const k=c.trim().toLowerCase();return CTX[k]||'{'+c.trim()+'}';}).replace(/\*/g,'*');
      navigator.clipboard.writeText(raw);toast('Balão copiado: '+b.t);
    };
    out.appendChild(btn);
  });
  if(!achou.length)out.innerHTML='<div style="font-size:12px;color:#73808f">Nenhum balão correspondente.</div>';
}

/* ====================== MODAL ====================== */
function abrirModal(){
  document.getElementById('fAtendente').value=CTX.atendente;
  document.getElementById('fProfissional').value=CTX.profissional;
  document.getElementById('fEspecialidade').value=CTX.especialidade;
  document.getElementById('fData').value=CTX.data;
  document.getElementById('fHora').value=CTX.hora;
  document.getElementById('overlay').classList.remove('escondido');
}
function fecharModal(){document.getElementById('overlay').classList.add('escondido');}
function salvarDados(){
  CTX={
    atendente:document.getElementById('fAtendente').value.trim(),
    profissional:document.getElementById('fProfissional').value.trim(),
    especialidade:document.getElementById('fEspecialidade').value.trim(),
    data:document.getElementById('fData').value.trim(),
    hora:document.getElementById('fHora').value.trim()
  };
  try{localStorage.setItem('equi_ctx',JSON.stringify(CTX));}catch(e){}
  atualizaUser();fecharModal();render();toast('Dados aplicados aos balões');
}
function atualizaUser(){
  document.getElementById('uNome').textContent=CTX.atendente||'Recepção';
  document.getElementById('uEsp').textContent=CTX.especialidade||'—';
  document.getElementById('uAv').textContent=(CTX.atendente||'R').trim().charAt(0).toUpperCase();
}

/* ====================== TOAST ====================== */
let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}

/* ====================== INIT ====================== */
atualizaUser();
render();
// Abre o onboarding na primeira vez (sem dados salvos)
if(!CTX.atendente && !CTX.profissional){ abrirModal(); }
else { document.getElementById('overlay').classList.add('escondido'); }
