<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel de Mensagens · Equilibrium Med Center</title>
<style>
  :root{
    --ink:#14304a; --forest:#1868B0; --teal:#1B86A6; --lime:#50C0D0;
    --bg:#eef4fb; --card:#ffffff; --mist:#dceaf6; --line:#d2e2f0;
    --soft:#5d7488; --warn:#b8743a; --warnbg:#fbf0e6;
    --radius:16px; --shadow:0 1px 2px rgba(20,48,74,.05),0 8px 24px rgba(20,48,74,.07);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px}

  /* header */
  header{background:linear-gradient(180deg,#ffffff, #f7fbfe);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;backdrop-filter:saturate(1.1) blur(6px)}
  .head-top{display:flex;align-items:center;gap:14px;padding:18px 0 14px}
  .mark{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
  .logo{height:44px;width:auto;display:block}
  .sub{font-size:13px;color:var(--soft);padding-left:14px;border-left:1px solid var(--line);letter-spacing:.02em;white-space:nowrap}
  .role{font-size:12px;color:var(--soft);text-align:right;letter-spacing:.04em;text-transform:uppercase}

  .controls{display:flex;gap:12px;flex-wrap:wrap;padding-bottom:16px}
  .field{position:relative;flex:1;min-width:200px}
  .field label{position:absolute;top:7px;left:14px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
  .field input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:12px;
    padding:24px 14px 9px;font-size:15px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
  .field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(24,104,176,.18)}
  .field.search{flex:2}
  .field.search input{padding-left:40px}
  .field.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.45}
  .idxbtn{border:1px solid var(--line);background:var(--card);color:var(--forest);border-radius:12px;
    padding:0 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;
    transition:all .14s;white-space:nowrap}
  .idxbtn:hover{border-color:var(--teal)}
  .idxbtn.on{background:var(--forest);border-color:var(--forest);color:#fff}
  .fills{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding-bottom:16px}
  .field.sm{flex:0 1 130px;min-width:110px}
  .fills-label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);
    white-space:nowrap;align-self:center}
  .clearbtn{border:1px solid var(--line);background:var(--card);color:var(--soft);border-radius:12px;
    padding:0 16px;height:46px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;
    transition:all .14s}
  .clearbtn:hover{border-color:var(--warn);color:var(--warn)}

  /* chips */
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 0 18px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--soft);
    padding:7px 14px;border-radius:999px;font-size:13.5px;cursor:pointer;transition:all .14s;white-space:nowrap}
  .chip:hover{border-color:var(--teal);color:var(--forest)}
  .chip.on{background:var(--forest);border-color:var(--forest);color:#fff}
  .chip .n{opacity:.6;font-variant-numeric:tabular-nums;margin-left:5px}
  .chip.on .n{opacity:.8}
  .chip .pf{font-size:10.5px;font-weight:700;letter-spacing:.04em;opacity:.55;margin-left:6px;
    font-family:"SFMono-Regular",Menlo,Consolas,monospace}
  .chip.on .pf{opacity:.85}

  /* grid */
  main{padding:22px 0 60px}
  .count{font-size:13px;color:var(--soft);margin:0 0 14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
  .card-h{padding:15px 16px 0;display:flex;align-items:center;gap:9px}
  .code{font-size:12px;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--forest);
    border-radius:7px;padding:4px 9px;font-family:"SFMono-Regular",Menlo,Consolas,monospace;
    font-variant-numeric:tabular-nums;white-space:nowrap}
  .tag{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);
    background:var(--mist);border-radius:6px;padding:3px 8px;white-space:nowrap;font-weight:600}
  .card h3{margin:11px 16px 0;font-size:15.5px;line-height:1.3}
  .msg{margin:10px 16px 0;background:#f4f9fd;border:1px solid var(--line);border-radius:10px;
    padding:12px 13px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;color:#384a43;
    max-height:172px;overflow:auto;font-family:"SFMono-Regular",Menlo,Consolas,monospace}
  .card-f{padding:12px 16px 15px;margin-top:auto;display:flex;gap:8px;align-items:center}
  .copy{flex:1;border:none;background:var(--forest);color:#fff;border-radius:11px;padding:11px;
    font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,transform .05s}
  .copy:hover{background:#12517f}
  .copy:active{transform:scale(.985)}
  .copy.done{background:var(--teal)}
  .card.sensivel{border-color:#d9b48f;box-shadow:0 8px 24px rgba(184,116,58,.1)}
  .card.sensivel .code{background:var(--warn)}
  .card.best{border-color:var(--forest);box-shadow:0 0 0 2px rgba(24,104,176,.16),var(--shadow)}
  .best-badge{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:var(--forest);border-radius:6px;padding:3px 8px;white-space:nowrap}
  .card.sensivel .tag{color:var(--warn);background:var(--warnbg)}
  .card.sensivel .msg{background:var(--warnbg);border-color:#e6cdb2}
  .note{font-size:11.5px;color:var(--warn);margin:9px 16px 0;display:flex;gap:6px;line-height:1.4}

  .empty{text-align:center;color:var(--soft);padding:70px 20px}
  .empty b{display:block;color:var(--ink);font-size:18px;margin-bottom:6px}

  /* índice */
  #indice{display:none}
  .idx-intro{font-size:13px;color:var(--soft);margin:0 0 18px}
  .idx-group{margin:0 0 22px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);overflow:hidden;box-shadow:var(--shadow)}
  .idx-gh{display:flex;align-items:baseline;gap:10px;padding:13px 16px;background:var(--mist);border-bottom:1px solid var(--line)}
  .idx-gh b{font-size:14.5px;color:var(--ink)}
  .idx-gh .pftag{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--forest);font-family:"SFMono-Regular",Menlo,Consolas,monospace}
  .idx-row{display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .idx-row:last-child{border-bottom:none}
  .idx-row:hover{background:#f4f9fd}
  .idx-row .c{font-size:12px;font-weight:700;color:var(--forest);font-family:"SFMono-Regular",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums;white-space:nowrap;min-width:62px}
  .idx-row .ti{font-size:13.5px;color:var(--ink)}
  .idx-row.sens .c{color:var(--warn)}
  #fluxos{display:none}
  .flo-intro{font-size:13px;color:var(--soft);margin:0 0 18px}
  .flo-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .flo-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;cursor:pointer;transition:border-color .14s}
  .flo-card:hover{border-color:var(--teal)}
  .flo-card .flo-title{font-size:15.5px;font-weight:700;color:var(--ink);margin-bottom:5px;display:flex;align-items:center}
  .flo-card .flo-desc{font-size:13px;color:var(--soft);line-height:1.45}
  .flo-card .flo-meta{font-size:11.5px;color:var(--teal);margin-top:10px;font-weight:600}
  .flo-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:9px;vertical-align:middle;flex:none}
  .flo-back{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card);color:var(--forest);border-radius:10px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-bottom:16px}
  .flo-back:hover{border-color:var(--teal)}
  .flo-head{font-size:18px;font-weight:700;margin:0 0 4px}
  .flo-sub{font-size:13px;color:var(--soft);margin:0 0 22px}
  .flo-step{display:flex;gap:14px;padding:0 0 18px;position:relative}
  .flo-step:not(:last-child)::before{content:"";position:absolute;left:15px;top:36px;bottom:-2px;width:2px;background:var(--line)}
  .flo-n{flex:none;width:32px;height:32px;border-radius:50%;background:var(--forest);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:1}
  .flo-bd{flex:1;padding-top:4px}
  .flo-name{font-size:15px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .flo-tag{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--warn);background:var(--warnbg);border-radius:5px;padding:2px 7px}
  .flo-note{font-size:13px;color:var(--soft);line-height:1.5;margin:5px 0 10px}
  .flo-codes{display:flex;flex-wrap:wrap;gap:7px}
  .flo-code{border:1px solid var(--line);background:var(--mist);color:var(--forest);border-radius:8px;padding:5px 10px;font-size:12.5px;font-weight:700;font-family:"SFMono-Regular",Menlo,Consolas,monospace;cursor:pointer;transition:all .12s}
  .flo-code:hover{background:var(--forest);color:#fff;border-color:var(--forest)}

  footer{border-top:1px solid var(--line);padding:20px 0;color:var(--soft);font-size:12px;text-align:center}

  @media (max-width:560px){
    .role,.sub{display:none}
    .grid{grid-template-columns:1fr}
    .logo{height:36px}
  }
  @media print{
    header .controls,header .fills,header .chips,.idxbtn,.flobtn,.role{display:none}
    .idx-group{break-inside:avoid}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#1d2b26" stroke-width="2"/><path d="m20 20-3-3" stroke="#1d2b26" stroke-width="2" stroke-linecap="round"/></svg>
        <label>Buscar por situação ou código</label>
        <input id="q" autocomplete="off" placeholder="ex.: AGE-01, 02, guia, receita, agendar, valores…">
      </div>
      <button class="idxbtn" id="idxbtn" type="button">📑 Índice</button>
      <button class="idxbtn flobtn" id="flobtn" type="button">🧭 Fluxos</button>
    </div>
    <div class="fills">
      <span class="fills-label">Preenche ao copiar:</span>
      <div class="field">
        <label>Atendente (você)</label>
        <input id="f_atend" autocomplete="off" placeholder="Seu nome">
      </div>
      <div class="field">
        <label>Paciente</label>
        <input id="f_pac" autocomplete="off" placeholder="Nome do paciente">
      </div>
      <div class="field">
        <label>Profissional</label>
        <input id="f_prof" autocomplete="off" list="proflist" placeholder="Nome do profissional">
        <datalist id="proflist"></datalist>
      </div>
      <div class="field">
        <label>Especialidade</label>
        <input id="f_esp" autocomplete="off" list="esplist" placeholder="Especialidade">
        <datalist id="esplist"></datalist>
      </div>
      <div class="field sm">
        <label>Data</label>
        <input id="f_data" autocomplete="off" placeholder="00/00">
      </div>
      <div class="field sm">
        <label>Hora</label>
        <input id="f_hora" autocomplete="off" placeholder="00h00">
      </div>
      <button class="clearbtn" id="clearbtn" type="button" title="Limpa paciente e profissional para um novo atendimento (mantém o seu nome)">↺ Novo atendimento</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>
</header>

<main class="wrap">
  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <b>Nenhuma mensagem encontrada</b>
    Tente outra palavra — como “guia”, “lembrete”, “desistência” ou “cartão” — ou um código como “AGE-01”.
  </div>
  <section id="indice"></section>

 // ---------- CARTÃO & VENDAS ----------
 {cat:"cartao",title:"Cartão — pitch de abertura",kw:"cartao mais saude desconto apresentar oferta",body:
`Posso te apresentar uma forma de cuidar da sua saúde mental gastando bem menos? 😊

O *Equilibrium Mais Saúde* é o nosso programa de descontos: com uma mensalidade acessível, você tem *50% de desconto* nos atendimentos particulares da clínica — psicoterapia, psiquiatria, terapias infantis e mais.

Não é plano de saúde nem convênio: é um clube de benefícios da própria Equilibrium, pensado para quem quer continuidade no cuidado pagando menos. Quer que eu te mostre a conta? 💙`},

 {cat:"cartao",title:"Cartão — frase de impacto (economia)",kw:"economia conta vale a pena consulta paga",body:
`Olha só: o plano *Mais Individual* custa *R$ 59 por mês*.

Em *uma única consulta psiquiátrica*, você já economiza *R$ 250* — ou seja, mais de 4 meses de mensalidade pagos de uma vez. 💙

E se você faz acompanhamento contínuo, a economia se multiplica todo mês.`},

 {cat:"cartao",title:"Cartão — plano Mais Individual",kw:"cartao mais individual 59 titular",body:
`Para quem vai cuidar de si mesmo, o plano *Mais Individual* é o ideal: *R$ 59/mês* e 50% de desconto em todos os atendimentos.

Se você pretende fazer acompanhamento, ele se paga sozinho logo na primeira consulta. Quer começar? 💙`},

 {cat:"cartao",title:"Cartão — plano Mais Família",kw:"cartao mais familia 99 dependentes casal",body:
`Se o cuidado é para a família, o plano *Mais Família* cobre você + até 3 pessoas (total de 4), por *R$ 99/mês*.

É a opção mais escolhida por casais e por famílias com filhos em terapia, porque o desconto de 50% vale para todos os titulares do cartão. Quer que eu monte para a sua família? 💙`},

 {cat:"cartao",title:"Cartão — plano Muito Mais Família",kw:"cartao muito mais familia 119 seis pessoas",body:
`Para famílias maiores, temos o *Muito Mais Família*: até 6 pessoas (titular + 5), por *R$ 119/mês*.

Quando há mais de um filho em acompanhamento, costuma ser a escolha mais econômica de todas. Posso te explicar como incluir cada pessoa? 💙`},

 {cat:"cartao",title:"Cartão — vantagens (multa zero)",kw:"multa zero fidelidade cancelar arrependimento",body:
`E o melhor: o *Equilibrium Mais Saúde* não te prende. 😊

✅ *Multa zero* para cancelar
✅ Após 12 meses, prazo indeterminado — *sem nova fidelidade*
✅ Tabela de preços transparente, sempre à vista
✅ Direito de arrependimento garantido

Você fica porque vale a pena, não porque é obrigado(a). 💙`},

 {cat:"cartao",title:"Objeção — “É plano de saúde?”",kw:"objecao plano de saude convenio nao",body:
`Ótima pergunta! 😊 Não, não é plano de saúde nem convênio. É um *programa de descontos* da própria Equilibrium: você paga uma mensalidade e ganha 50% de desconto nos nossos atendimentos particulares. Os atendimentos continuam sendo particulares — só que com um preço muito menor para você. 💙`},

 {cat:"cartao",title:"Objeção — “Está caro”",kw:"objecao caro compensa conta",body:
`Entendo! 😊 Vamos fazer a conta juntos: quantos atendimentos você costuma fazer por mês? Em quase todos os casos, a economia de uma ou duas consultas já cobre a mensalidade inteira — o resto do mês é economia pura para você. 💙`},

 {cat:"cartao",title:"Objeção — “Vou pensar”",kw:"objecao vou pensar depois tabela simulacao",body:
`Claro, fique à vontade! 😊 Posso te deixar a tabelinha de valores e a simulação de economia para você analisar com calma? Quando quiser, é só me chamar que reservo tudo para você sem compromisso. 💙`},

 {cat:"cartao",title:"Objeção — “Já tenho convênio”",kw:"objecao ja tenho convenio complementar fila",body:
`Que bom! 😊 O cartão pode te ajudar justamente naquilo que o convênio não cobre ou tem fila — como algumas terapias, pacotes infantis ou avaliações. Muita gente usa os dois de forma complementar. Quer que eu te mostre onde ele mais compensa para o seu caso? 💙`},

 {cat:"cartao",title:"Objeção — Avaliação neuropsicológica (elegibilidade)",kw:"objecao neuropsicologica elegibilidade 180 dias quitacao anual",body:
`A avaliação neuropsicológica, que é particular R$ 3.800, sai por *R$ 1.900* com o cartão. 😊

Por ser um serviço de alto valor, esse desconto integral tem uma *condição de elegibilidade*: vale para quem está há 180 dias com as mensalidades em dia *ou* para quem opta pela quitação anual antecipada. Os demais atendimentos já têm 50% desde a adesão. Quer que eu te explique qual caminho compensa mais para você? 💙`},

 {cat:"cartao",title:"Objeção — “Tem fidelidade?”",kw:"objecao fidelidade multa cancelar prazo",body:
`Pode ficar tranquilo(a)! 😊 *Multa zero* e, depois dos 12 primeiros meses, o cartão segue por prazo indeterminado, sem nenhuma nova fidelidade. Você permanece só enquanto fizer sentido para você. 💙`},

 {cat:"cartao",title:"Cartão — fechamento",kw:"fechamento adesao cadastro garantir",body:
`Então vamos garantir o seu *Equilibrium Mais Saúde*? 😊

Para a adesão, eu vou precisar de:
👤 Seus dados (e dos dependentes, se for plano familiar)
📄 A escolha do plano: Mais Individual, Mais Família ou Muito Mais Família
💳 A forma de pagamento da mensalidade

Em poucos minutos você já começa a economizar no seu próximo atendimento. Posso seguir com o seu cadastro? 💙`},

 {cat:"cartao",title:"B2B — abordagem RH",kw:"empresa b2b rh funcionarios beneficio corporativo",body:
`Olá! 😊 Sou da *Equilibrium Mais Saúde*. Trabalhamos com um programa que pode ser um benefício valioso e de baixo custo para a sua equipe.

A empresa oferece aos funcionários *50% de desconto* em atendimentos de saúde mental — psicoterapia, psiquiatria e mais — a partir de *R$ 25 por funcionário/mês*.

É um cuidado real com o bem-estar do time, que ajuda inclusive na produtividade e na retenção de talentos. Posso preparar uma proposta para o porte da sua empresa? 💙`},

 {cat:"cartao",title:"B2B — argumento de valor",kw:"empresa argumento afastamento produtividade clima",body:
`Saúde mental é hoje uma das principais causas de afastamento no trabalho. Oferecer acesso facilitado a cuidado, com 50% de desconto, é um investimento que retorna em presença, engajamento e clima organizacional — por um custo mensal muito acessível por colaborador. 💙`},

// ---- atribuição de códigos (AGE-01, ATD-03, ...) ----
(function assignCodes(){
  const counters={};
  for(const m of MSGS){
    counters[m.cat]=(counters[m.cat]||0)+1;
    const n=String(counters[m.cat]).padStart(2,"0");
    m.code = (PREFIX[m.cat]||"MSG")+"-"+n;
    m._codekey = m.code.toLowerCase().replace(/[^a-z0-9]/g,""); // "age01"
    m._num = counters[m.cat];
  }
})();

// ---- normalize for search ----
const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
const STOP = new Set("com de da do das dos para por e a o os as um uma na no nas nos em que ao aos sobre minha meu meus minhas".split(" "));
function score(m,tokens){
  const t=norm(m.title),k=norm(m.kw),b=norm(m.body),c=m._codekey;let s=0,all=true;
  for(const tok of tokens){
    const tk=tok.replace(/[^a-z0-9]/g,"");
    if(c && tk && c.includes(tk))s+=8;
    else if(t.includes(tok))s+=6;else if(k.includes(tok))s+=3;else if(b.includes(tok))s+=1;else all=false;
  }
  if(all&&tokens.length)s+=4;
  return s;
}

// reconhece código completo (age01), prefixo (age) ou número solto (02)
function parseCode(qkey){
  const mFull = qkey.match(/^([a-z]{2,4})(\d{1,2})$/);
  if(mFull && PREFIX_TO_CAT[mFull[1]]) return {type:"full",cat:PREFIX_TO_CAT[mFull[1]],num:parseInt(mFull[2],10)};
  if(PREFIX_TO_CAT[qkey]) return {type:"prefix",cat:PREFIX_TO_CAT[qkey]};
  if(/^\d{1,2}$/.test(qkey)) return {type:"num",num:parseInt(qkey,10)};
  return null;
}

// build chips
function buildChips(){
  const counts = {todos:MSGS.length};
  Object.keys(CATS).forEach(c=>counts[c]=MSGS.filter(m=>m.cat===c).length);
  const order = ["todos",...Object.keys(CATS)];
  chipsEl.innerHTML = order.map(c=>{
    const label = c==="todos" ? "Todos" : CATS[c];
    const pf = c==="todos" ? "" : `<span class="pf">${PREFIX[c]}</span>`;
    return `<button class="chip ${c===active?'on':''}" data-c="${c}">${label}${pf}<span class="n">${counts[c]}</span></button>`;
  }).join("");
  chipsEl.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{active=b.dataset.c;if(view!=="msgs"){view="msgs";openFlow=null;idxBtn.classList.remove("on");fluxosBtn.classList.remove("on");}buildChips();render();});
}

function escapeHtml(s){return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}

function render(){
  indiceEl.style.display="none";
  fluxosEl.style.display="none";
  if(view==="indice"){renderIndice();return;}
  if(view==="fluxos"){renderFluxos();return;}
  const raw = norm(q.value.trim());
  const qkey = raw.replace(/[^a-z0-9]/g,"");
  const codeQ = raw ? parseCode(qkey) : null;

  let items, hasQuery=false, codeHit=false;

  if(codeQ){
    codeHit=true;
    if(codeQ.type==="full"){
      items = MSGS.map((m,idx)=>({m,idx})).filter(o=>o.m.cat===codeQ.cat && o.m._num===codeQ.num);
    }else if(codeQ.type==="prefix"){
      items = MSGS.map((m,idx)=>({m,idx})).filter(o=>o.m.cat===codeQ.cat);
    }else{ // num solto
      items = MSGS.map((m,idx)=>({m,idx}))
        .filter(o=> (active==="todos"||o.m.cat===active) && o.m._num===codeQ.num);
    }
  }else{
    const tokens = raw ? raw.split(/\s+/).filter(t=>t && !STOP.has(t)) : [];
    hasQuery = tokens.length>0;
    items = MSGS.map((m,idx)=>({m,idx})).filter(o=> active==="todos" || o.m.cat===active);
    if(tokens.length){
      items = items.map(o=>({...o, s:score(o.m,tokens)})).filter(o=>o.s>0).sort((a,b)=>b.s-a.s);
    }
  }

  const showBest = (hasQuery || codeHit) && items.length>0;
  let tail = "";
  if(codeHit) tail = " · por código";
  else if(hasQuery) tail = " · por relevância";
  else if(active!=="todos") tail = " · "+CATS[active];
  countEl.textContent = items.length===0 ? "" :
    `${items.length} ${items.length===1?'mensagem':'mensagens'}${tail}`;
  emptyEl.style.display = items.length? "none":"block";

  grid.innerHTML = items.map((o,i)=>{
    const m=o.m, best = showBest && i===0;
    return `
    <div class="card ${m.sensivel?'sensivel':''} ${best?'best':''}">
      <div class="card-h"><span class="code">${m.code}</span><span class="tag">${CATS[m.cat]}</span>${best?'<span class="best-badge">Melhor resposta</span>':''}</div>
      <h3>${escapeHtml(m.title)}</h3>
      <div class="msg">${escapeHtml(m.body)}</div>
      ${m.sensivel?'<div class="note">⚠️ Mensagem sensível — envie com cuidado e, se possível, acione um profissional da equipe.</div>':''}
      <div class="card-f"><button class="copy" data-idx="${o.idx}">Copiar mensagem</button></div>
    </div>`;}).join("");
  grid.querySelectorAll(".copy").forEach(b=>b.onclick=()=>doCopy(b));
}

function renderIndice(){
  grid.innerHTML="";
  emptyEl.style.display="none";
  indiceEl.style.display="block";
  countEl.textContent = `${MSGS.length} mensagens · índice por código`;
  let html = `<p class="idx-intro">Cada mensagem tem um código fixo (prefixo da categoria + número). Use-o na busca para ir direto à resposta — digite o código completo (ex.: <b>AGE-01</b>), só o prefixo (ex.: <b>AGE</b>) ou, com uma categoria selecionada, só o número (ex.: <b>02</b>). Clique em qualquer linha para abrir a mensagem.</p>`;
  for(const cat of Object.keys(CATS)){
    const list = MSGS.filter(m=>m.cat===cat);
    if(!list.length) continue;
    html += `<div class="idx-group">
      <div class="idx-gh"><b>${CATS[cat]}</b><span class="pftag">${PREFIX[cat]}-</span></div>
      ${list.map(m=>`<div class="idx-row ${m.sensivel?'sens':''}" data-code="${m.code}"><span class="c">${m.code}</span><span class="ti">${escapeHtml(m.title)}</span></div>`).join("")}
    </div>`;
  }
  indiceEl.innerHTML = html;
  indiceEl.querySelectorAll(".idx-row").forEach(r=>r.onclick=()=>gotoCode(r.dataset.code));
}

function setView(v){
  view = (view===v) ? "msgs" : v;
  if(view!=="fluxos") openFlow=null;
  idxBtn.classList.toggle("on", view==="indice");
  fluxosBtn.classList.toggle("on", view==="fluxos");
  render();
}

fluxosBtn.onclick=()=>setView("fluxos");

function gotoCode(code){
  view="msgs"; openFlow=null;
  idxBtn.classList.remove("on"); fluxosBtn.classList.remove("on");
  active="todos"; q.value=code; buildChips(); render();
  window.scrollTo({top:0,behavior:"smooth"});
}

    fluxosEl.querySelectorAll(".flo-card").forEach(c=>c.onclick=()=>{openFlow=c.dataset.flow;renderFluxos();window.scrollTo({top:0,behavior:"smooth"});});

  fluxosEl.innerHTML = `<button class="flo-back">← Todos os fluxos</button>`
    + `<h2 class="flo-head"><span class="flo-dot" style="background:${f.color}"></span>${escapeHtml(f.title)}</h2><p class="flo-sub">${escapeHtml(f.desc)}</p>`
    + f.steps.map((s,i)=>`<div class="flo-step"><div class="flo-n" style="background:${f.color}">${i+1}</div><div class="flo-bd">`
        + `<div class="flo-name">${escapeHtml(s.name)}${s.branch?'<span class="flo-tag">desvio</span>':''}</div>`
        + `<div class="flo-note">${escapeHtml(s.note)}</div>`
        + ((s.codes&&s.codes.length)?`<div class="flo-codes">${s.codes.map(c=>`<button class="flo-code" data-code="${c}">${c}</button>`).join("")}</div>`:"")
        + `</div></div>`).join("");
  fluxosEl.querySelector(".flo-back").onclick=()=>{openFlow=null;renderFluxos();window.scrollTo({top:0,behavior:"smooth"});};
  fluxosEl.querySelectorAll(".flo-code").forEach(b=>b.onclick=()=>gotoCode(b.dataset.code));
}

function preencher(text){
  const at=fAtend.value.trim(), pa=fPac.value.trim(), pr=fProf.value.trim(),
        es=fEsp.value.trim(), da=fData.value.trim(), ho=fHora.value.trim();
  if(at) text=text.split("[NOME DO ATENDENTE]").join(at);
  if(pa){
    text=text.split("[NOME DO PACIENTE/RESPONSÁVEL]").join(pa);
    text=text.split("[NOME DO PACIENTE]").join(pa);
  }
  if(pr) text=text.split("[PROFISSIONAL]").join(pr);
  if(es) text=text.split("[ESPECIALIDADE]").join(es);
  if(da) text=text.split("[DATA]").join(da);
  if(ho) text=text.split("[HORÁRIO]").join(ho);
  return text;
}

function doCopy(btn){
  const m = MSGS[+btn.dataset.idx];
  let text = preencher(m.body);
  const done = ()=>{btn.textContent="Copiado ✓";btn.classList.add("done");
    setTimeout(()=>{btn.textContent="Copiar mensagem";btn.classList.remove("done");},1600);};
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else fallback(text,done);
}
function fallback(text,done){
  const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");done();}catch(e){alert("Não foi possível copiar automaticamente.");}
  document.body.removeChild(ta);
}
