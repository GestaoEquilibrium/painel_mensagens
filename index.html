<title>Painel de Cards — Equilibrium (protótipo)</title>
<style>
:root{
  --azul:#1868B0; --azul-2:#0f4d86; --ciano:#1B86A6; --ciano-claro:#50C0D0;
  --bg:#eef2f7; --card:#ffffff; --linha:#e3e9f0; --linha-2:#d4deea;
  --texto:#16273b; --muted:#6a7888; --verde:#25D366; --verde-2:#1ebe5d;
  --warn:#b8743a; --warnbg:#fbf2e9; --ok:#1E8A5A;
  --sombra:0 1px 2px rgba(16,40,70,.05),0 6px 22px rgba(16,40,70,.07);
  --raio:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--texto);-webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--texto)}
.hidden{display:none !important}

/* ---------- LOGIN ---------- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1200px 600px at 50% -10%,#dceaf8,transparent),var(--bg)}
.login-box{background:var(--card);border:1px solid var(--linha);border-radius:20px;
  box-shadow:var(--sombra);max-width:560px;width:100%;padding:38px 34px 30px;text-align:center}
.login-box .mark{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
.login-box .mark svg{width:44px;height:44px}
.login-box h1{margin:8px 0 2px;font-size:26px;letter-spacing:-.5px}
.login-box .sub{color:var(--muted);font-size:13.5px;margin-bottom:24px}
.login-box .label{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);
  text-align:left;margin:14px 2px 10px;font-weight:700}
.users{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.user-btn{display:flex;align-items:center;gap:10px;border:1px solid var(--linha-2);background:#fff;
  border-radius:12px;padding:11px 12px;text-align:left;transition:all .14s}
.user-btn:hover{border-color:var(--azul);box-shadow:0 4px 14px rgba(24,104,176,.12);transform:translateY(-1px)}
.avatar{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:14px}
.user-btn .nome{font-weight:600;font-size:14px;line-height:1.1}
.user-btn .papel{font-size:11px;color:var(--muted)}
.login-foot{margin-top:22px;font-size:12px;color:var(--muted)}

/* ---------- APP ---------- */
#app{display:none;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}
.side{background:linear-gradient(180deg,var(--azul),var(--azul-2));color:#fff;display:flex;flex-direction:column;overflow:hidden}
.brand{display:flex;align-items:center;gap:11px;padding:20px 18px 16px}
.brand svg{width:40px;height:40px;flex:none}
.brand b{font-size:21px;letter-spacing:-.4px;display:block;line-height:1}
.brand span{font-size:9.5px;letter-spacing:3px;opacity:.8;display:block;margin-top:3px}
.side .scroll{flex:1;overflow-y:auto;padding:6px 10px 16px}
.side .scroll::-webkit-scrollbar{width:7px}
.side .scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:8px}
.grp{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:.6;margin:16px 10px 7px;font-weight:700}
.navitem{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;color:#eaf3fb;
  text-align:left;padding:9px 11px;border-radius:10px;font-size:13.5px;margin-bottom:2px;transition:background .14s}
.navitem:hover{background:rgba(255,255,255,.10)}
.navitem.on{background:rgba(255,255,255,.18);font-weight:600;box-shadow:inset 3px 0 0 #fff}
.navitem .ic{width:16px;text-align:center;opacity:.9}
.navitem .cont{margin-left:auto;font-size:11px;opacity:.75;background:rgba(255,255,255,.14);padding:1px 7px;border-radius:20px}

.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 22px;background:#fff;border-bottom:1px solid var(--linha)}
.search{flex:1;position:relative;max-width:520px}
.search input{width:100%;border:1px solid var(--linha-2);background:#f6f9fc;border-radius:11px;
  padding:11px 14px 11px 38px;outline:none;transition:border-color .14s,box-shadow .14s}
.search input:focus{border-color:var(--ciano);box-shadow:0 0 0 3px rgba(27,134,166,.16);background:#fff}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4}
.btn{border:1px solid var(--linha-2);background:#fff;border-radius:11px;padding:10px 14px;font-size:13.5px;
  font-weight:600;color:var(--texto);display:inline-flex;align-items:center;gap:7px;transition:all .14s}
.btn:hover{border-color:var(--azul);color:var(--azul)}
.btn-primary{background:linear-gradient(135deg,var(--azul),var(--ciano));border:0;color:#fff}
.btn-primary:hover{filter:brightness(.96);color:#fff}
.whoami{display:flex;align-items:center;gap:9px;padding-left:6px;border-left:1px solid var(--linha);margin-left:2px}
.whoami .nome{font-size:13px;font-weight:600;line-height:1.05}
.whoami .papel{font-size:11px;color:var(--muted)}
.linkbtn{background:none;border:0;color:var(--muted);font-size:12px;text-decoration:underline;padding:2px}

/* dados do atendimento */
.ctxbar{background:#fff;border-bottom:1px solid var(--linha);padding:0 22px}
.ctxhead{display:flex;align-items:center;gap:10px;padding:11px 0;cursor:pointer;user-select:none;font-size:13px;color:var(--muted)}
.ctxhead b{color:var(--texto)}
.ctxhead .chev{margin-left:auto;transition:transform .2s}
.ctxbar.open .chev{transform:rotate(180deg)}
.ctxgrid{display:none;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:2px 0 16px}
.ctxbar.open .ctxgrid{display:grid}
.field{position:relative}
.field label{position:absolute;top:6px;left:12px;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.field input{width:100%;border:1px solid var(--linha-2);border-radius:10px;padding:21px 12px 8px;outline:none;transition:border-color .14s}
.field input:focus{border-color:var(--ciano)}

.content{flex:1;overflow-y:auto;padding:18px 22px 60px}
.crumb{font-size:13px;color:var(--muted);margin-bottom:4px}
.crumb b{color:var(--texto)}
.count{font-size:12.5px;color:var(--muted);margin:2px 0 14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:15px}

/* card */
.card{background:var(--card);border:1px solid var(--linha);border-radius:var(--raio);box-shadow:var(--sombra);
  display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:0 2px 6px rgba(16,40,70,.07),0 14px 32px rgba(16,40,70,.10)}
.card.sensivel{border-color:#e0bd99}
.card.best{border-color:var(--azul);box-shadow:0 0 0 2px rgba(24,104,176,.14),var(--sombra)}
.card-h{padding:13px 15px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{font-size:10px;letter-spacing:.04em;text-transform:uppercase;font-weight:700;color:#fff;border-radius:6px;padding:3px 8px;white-space:nowrap}
.badge{font-size:10px;font-weight:700;border-radius:6px;padding:3px 7px;white-space:nowrap}
.badge.oficial{background:#e7f0fa;color:var(--azul)}
.badge.sugestao{background:#fdf1e3;color:var(--warn)}
.badge.pessoal{background:#eef0f3;color:var(--muted)}
.best-badge{margin-left:auto;font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:var(--azul);border-radius:6px;padding:3px 8px}
.card h3{margin:10px 15px 0;font-size:15px;line-height:1.3}
.msg{margin:9px 15px 0;background:#f5f9fc;border:1px solid var(--linha);border-radius:10px;padding:11px 12px;
  font-size:13px;line-height:1.55;white-space:pre-wrap;color:#33404d;max-height:168px;overflow:auto;
  font-family:"SFMono-Regular",Menlo,Consolas,monospace}
.card.sensivel .msg{background:var(--warnbg);border-color:#ecd6bd}
.var{display:inline;background:#fff4d6;border:1px dashed #e0b347;border-radius:5px;padding:0 4px;color:#9a6b12;font-weight:700;font-style:normal}
.var.filled{background:#e3f4ec;border:1px solid #9ad9bd;color:#0f6e56}
.card-meta{display:flex;align-items:center;gap:12px;padding:9px 15px 0;font-size:11.5px;color:var(--muted)}
.card-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--linha-2)}
.card-f{padding:11px 15px 13px;margin-top:auto;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.copy{flex:1;min-width:120px;border:none;background:var(--azul);color:#fff;border-radius:10px;padding:10px;
  font-size:13.5px;font-weight:600;transition:background .14s,transform .05s}
.copy:hover{background:var(--azul-2)}
.copy:active{transform:scale(.985)}
.copy.done{background:var(--ok)}
.zap{border:none;background:var(--verde);color:#fff;border-radius:10px;padding:10px 12px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.zap:hover{background:var(--verde-2)}
.iconbtn{border:1px solid var(--linha-2);background:#fff;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .14s}
.iconbtn:hover{border-color:var(--azul);color:var(--azul)}
.iconbtn.fav.on{color:#e6a817;border-color:#f0cf86;background:#fff8e8}
.iconbtn.up.on{color:var(--ok);border-color:#a8dcc4;background:#eaf6f0}

.empty{text-align:center;color:var(--muted);padding:70px 20px}
.empty svg{opacity:.35;margin-bottom:10px}
.empty b{display:block;color:var(--texto);font-size:17px;margin-bottom:5px}

/* aviso/banner */
.aviso{margin:0 0 15px;background:#fff6e9;border:1px solid #ecd6bd;border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:10px;color:#8a5a22;font-size:13.5px}
.aviso b{color:#7a4d18}
.aviso .x{margin-left:auto;background:none;border:0;color:#b58a52;font-size:18px;line-height:1}

/* usuarios */
.upanel{grid-column:1/-1;background:#fff;border:1px solid var(--linha);border-radius:var(--raio);box-shadow:var(--sombra);overflow:hidden}
.upanel .uhead{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--linha)}
.upanel .uhead b{font-size:15px}
.upanel .uhead .btn-primary{margin-left:auto}
.urow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--linha)}
.urow:last-child{border-bottom:0}
.urow.off{opacity:.55}
.urow .nome{font-weight:600;font-size:14px}
.urow .pbadge{font-size:10.5px;font-weight:700;border-radius:6px;padding:3px 8px;white-space:nowrap}
.urow .pbadge.adm{background:#fbe7d8;color:#a6651b}
.urow .pbadge.cc{background:#e7f0fa;color:var(--azul)}
.urow .status{font-size:11.5px;color:var(--ok);font-weight:600}
.urow .status.inativo{color:var(--muted)}
.urow .uacts{margin-left:auto;display:flex;gap:7px}
.uhint{padding:10px 16px;font-size:12px;color:var(--muted);background:#f8fafc}

/* modal */
.overlay{position:absolute;inset:0;background:rgba(18,32,50,.45);
  display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.modal{background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(16,40,70,.3);max-width:600px;width:100%;
  max-height:90vh;overflow:auto}
.modal-h{padding:20px 22px 6px;display:flex;align-items:center}
.modal-h h2{margin:0;font-size:19px}
.modal-h .x{margin-left:auto;background:none;border:0;font-size:22px;color:var(--muted);line-height:1}
.modal-b{padding:8px 22px 4px}
.flbl{display:block;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:14px 0 6px}
.modal-b input[type=text],.modal-b select,.modal-b textarea{width:100%;border:1px solid var(--linha-2);
  border-radius:10px;padding:10px 12px;outline:none;transition:border-color .14s}
.modal-b input:focus,.modal-b select:focus,.modal-b textarea:focus{border-color:var(--ciano)}
.modal-b textarea{min-height:120px;resize:vertical;line-height:1.5}
.varbar{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 2px}
.varchip{font-size:11px;border:1px dashed #e0b347;background:#fff8e8;color:#9a6b12;border-radius:20px;padding:4px 10px;font-weight:600}
.varchip:hover{background:#ffefc4}
.chkrow{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13.5px;color:var(--texto)}
.modal-f{padding:14px 22px 20px;display:flex;gap:9px;align-items:center}
.modal-f .btn-primary{margin-left:auto}
.btn-danger{border:1px solid #eccccc;background:#fff;color:#b23b3b}
.btn-danger:hover{background:#fbeded;border-color:#d99}

/* toast */
#toast{position:absolute;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:#16273b;color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;z-index:80;
  transition:opacity .2s,transform .2s;box-shadow:0 10px 30px rgba(0,0,0,.25);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:760px){
  #app{grid-template-columns:1fr}
  .side{position:fixed;left:-260px;top:0;bottom:0;width:248px;z-index:40;transition:left .2s}
  .side.open{left:0}
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =====================================================================
   CONFIG — cole aqui os dados do SEU projeto Supabase (deste sistema).
   Encontre em: Supabase → Project Settings → API
   ===================================================================== */
const SUPABASE_URL      = 'https://bhrzxpudwstofqasbjnv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJocnp4cHVkd3N0b2ZxYXNiam52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTA5NDUsImV4cCI6MjA5Nzk4Njk0NX0.3X3pu6MIFG4Oa17UdWAYubFXt-hPGW7c2bKY2HXO8Zg';

const configOK = !SUPABASE_URL.includes('COLE_') && !SUPABASE_ANON_KEY.includes('COLE_');
const sb = configOK ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const labelPapel = p => p==='administrador' ? 'Administrador' : 'Call-center';
const PALETA = ['#1868B0','#1B86A6','#6D4FA8','#1E8A5A','#C68A1E','#CB6B4A','#3E7CB1','#2E9E8F','#A8497A','#0F6E86'];

/* ======================= ESTADO (carregado do banco) ======================= */
let ME=null, view={tipo:'todos'};
let USUARIOS=[], CATEGORIAS=[], VARIAVEIS=[], CARDS=[], AVISO=null;
let FAVS=new Set(), VOTES=new Set(), CTX={};

/* ======================= UTIL ======================= */
const $ = id => document.getElementById(id);
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function cat(id){return CATEGORIAS.find(c=>c.id===id)||{id:id,nome:id,cor:'#1868B0'};}
function nomePor(uuid){ if(!uuid) return 'Sistema'; const u=USUARIOS.find(x=>x.id===uuid); return u?u.nome:'usuário removido'; }
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
function preencher(txt){ return (txt||'').replace(/\[([^\]]+)\]/g,(m,tok)=>{const k=tok.trim().toUpperCase();return CTX[k]?CTX[k]:m;}); }
function realcar(txt){ return esc(txt).replace(/\[([^\]]+)\]/g,(m,tok)=>{const k=tok.trim().toUpperCase();return CTX[k]?'<span class="var filled">'+esc(CTX[k])+'</span>':'<span class="var">'+esc(tok.trim())+'</span>';}); }

/* ======================= CARREGAMENTO ======================= */
async function carregarUsuarios(){ const {data}=await sb.from('usuarios').select('*').order('papel'); USUARIOS=data||[]; }
async function carregarCards(){
  const {data}=await sb.from('cards').select('*').order('atualizado_em',{ascending:false});
  CARDS=(data||[]).map(r=>({id:r.id,cat:r.categoria_id,titulo:r.titulo,texto:r.texto,kw:r.palavras_chave,
    sensivel:r.sensivel,origem:r.origem,usos:r.usos,uteis:r.uteis,criado_por:r.criado_por,criadoPor:nomePor(r.criado_por)}));
}
async function carregarTudo(){
  const c=await sb.from('categorias').select('*').order('ordem'); CATEGORIAS=c.data||[];
  const v=await sb.from('variaveis').select('*').order('ordem'); VARIAVEIS=v.data||[];
  CTX={}; VARIAVEIS.forEach(x=>CTX[x.chave]='');
  await carregarUsuarios(); await carregarCards();
  const f=await sb.from('card_favoritos').select('card_id').eq('usuario_id',ME.id); FAVS=new Set((f.data||[]).map(x=>x.card_id));
  const vo=await sb.from('card_votos').select('card_id').eq('usuario_id',ME.id); VOTES=new Set((vo.data||[]).map(x=>x.card_id));
  const a=await sb.from('avisos').select('*').eq('ativo',true).order('criado_em',{ascending:false}).limit(1); AVISO=(a.data&&a.data[0])||null;
}

/* ======================= LOGIN ======================= */
function montarLogin(){
  $('userList').innerHTML = USUARIOS.filter(u=>u.ativo!==false).map(u=>`
    <button class="user-btn" onclick="entrar('${u.id}')">
      <span class="avatar" style="background:${u.cor}">${u.nome.split(' ').map(p=>p[0]).slice(0,2).join('')}</span>
      <span><span class="nome">${esc(u.nome)}</span><span class="papel">${labelPapel(u.papel)}</span></span>
    </button>`).join('') || '<div style="grid-column:1/-1;color:var(--muted);font-size:13px">Nenhum usuário ativo. Cadastre pelo banco para começar.</div>';
}
async function entrar(id){
  ME = USUARIOS.find(u=>u.id===id);
  $('login').style.display='none'; $('app').style.display='grid';
  $('meAvatar').textContent = ME.nome.split(' ').map(p=>p[0]).slice(0,2).join('');
  $('meAvatar').style.background = ME.cor; $('meNome').textContent = ME.nome;
  $('mePapel').textContent = labelPapel(ME.papel);
  if(innerWidth<=760) $('menuBtn').classList.remove('hidden');
  if(view.tipo==='usuarios' && ME.papel!=='administrador') view={tipo:'todos'};
  await carregarTudo();
  CTX['NOME DO ATENDENTE'] = ME.papel==='administrador'? '' : ME.nome;
  montarCtx(); montarNav(); render();
}
function logout(){ ME=null; $('app').style.display='none'; $('login').style.display='flex'; montarLogin(); }

/* ======================= CONTEXTO ======================= */
function montarCtx(){
  $('ctxgrid').innerHTML = VARIAVEIS.map(v=>`
    <div class="field"><label>${esc(v.rotulo||v.chave)}</label>
      <input value="${esc(CTX[v.chave]||'')}" oninput="CTX['${v.chave}']=this.value; render()"></div>`).join('');
}

/* ======================= NAV ======================= */
function montarNav(){
  const cont = id => CARDS.filter(c=>c.cat===id).length;
  let h = `<div class="grp">Visões</div>`;
  h += navItem('todos','Todos os cards','▦', CARDS.length);
  h += navItem('fav','Favoritos','★', FAVS.size);
  h += navItem('equipe','Criados pela equipe','✎', CARDS.filter(c=>c.origem!=='oficial').length);
  h += navItem('usados','Mais usados','⚡','');
  h += `<div class="grp">Categorias</div>`;
  CATEGORIAS.forEach(c=> h += navItem('cat','<span style="color:'+c.cor+'">●</span> '+c.nome,'', cont(c.id), c.id));
  if(ME.papel==='administrador'){
    h += `<div class="grp">Administração</div>`;
    h += navItem('usuarios','Usuários','◍', USUARIOS.length);
  }
  $('navWrap').innerHTML = h;
}
function navItem(tipo,label,ic,cont,id){
  const ativo=(view.tipo===tipo && (tipo!=='cat'||view.id===id));
  const c=(cont===''||cont===undefined)?'':'<span class="cont">'+cont+'</span>';
  return `<button class="navitem ${ativo?'on':''}" onclick="irPara('${tipo}'${id?",'"+id+"'":''})"><span class="ic">${ic}</span><span>${label}</span>${c}</button>`;
}
function irPara(tipo,id){ view={tipo,id}; if(innerWidth<=760)$('side').classList.remove('open'); montarNav(); render(); }

/* ======================= RENDER ======================= */
function cardsFiltrados(){
  let lista=CARDS.slice();
  if(view.tipo==='cat') lista=lista.filter(c=>c.cat===view.id);
  else if(view.tipo==='fav') lista=lista.filter(c=>FAVS.has(c.id));
  else if(view.tipo==='equipe') lista=lista.filter(c=>c.origem!=='oficial');
  else if(view.tipo==='usados') lista=lista.sort((a,b)=>b.usos-a.usos);
  const q=$('busca').value.trim().toLowerCase();
  if(q) lista=lista.filter(c=>(c.titulo+' '+c.texto+' '+(c.kw||'')).toLowerCase().includes(q));
  return lista;
}
function tituloView(){
  if(view.tipo==='cat') return cat(view.id).nome;
  return {todos:'Todos os cards',fav:'Favoritos',equipe:'Criados pela equipe',usados:'Mais usados',usuarios:'Usuários'}[view.tipo];
}
function render(){
  if(view.tipo==='usuarios'){ if(ME.papel!=='administrador'){view={tipo:'todos'};} else { return renderUsuarios(); } }
  $('crumb').textContent = tituloView();
  const lista=cardsFiltrados();
  $('avisoWrap').innerHTML = (AVISO && view.tipo==='todos') ? `
    <div class="aviso"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>
      <span><b>Comunicado:</b> ${esc(AVISO.texto)}</span>
      ${ME.papel==='administrador'?'<button class="x" onclick="desligarAviso()" title="Desligar comunicado">×</button>':''}</div>` : '';
  $('contagem').textContent = lista.length + (lista.length===1?' card':' cards');
  if(!lista.length){
    $('grid').innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h4"/></svg>
      <b>Nenhum card aqui ainda</b>${view.tipo==='equipe'||view.tipo==='cat'?'Crie o primeiro card desta seção com o botão “Novo card”.':'Ajuste a busca ou crie um novo card.'}</div>`;
    return;
  }
  const best=lista.reduce((m,c)=>c.uteis>(m?.uteis||0)?c:m,null);
  $('grid').innerHTML = lista.map(c=>cardHTML(c, c===best && c.uteis>=8)).join('');
}
function cardHTML(c,isBest){
  const ct=cat(c.cat), fav=FAVS.has(c.id), votou=VOTES.has(c.id);
  const badge = c.origem==='oficial'?'<span class="badge oficial">Oficial</span>'
    : c.origem==='sugestao'?'<span class="badge sugestao">Sugestão</span>':'<span class="badge pessoal">Pessoal</span>';
  const podeEditar = c.origem!=='oficial' || ME.papel==='administrador';
  return `<div class="card ${c.sensivel?'sensivel':''} ${isBest?'best':''}">
    <div class="card-h"><span class="tag" style="background:${ct.cor}">${ct.id}</span>${badge}${isBest?'<span class="best-badge">★ mais útil</span>':''}</div>
    <h3>${esc(c.titulo)}</h3>
    <div class="msg">${realcar(c.texto)}</div>
    <div class="card-meta"><span>⚡ ${c.usos} usos</span><span class="dot"></span><span>👍 ${c.uteis}</span><span class="dot"></span><span>por ${esc(c.criadoPor)}</span></div>
    <div class="card-f">
      <button class="copy" onclick="copiar('${c.id}',this)">Copiar mensagem</button>
      <button class="zap" onclick="zap('${c.id}')" title="Abrir no WhatsApp"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2Zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .1-1.7-.1-.4-.1-.9-.3-1.6-.6-2.8-1.2-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.4 0 .5l-.3.5-.4.4c-.1.1-.3.3-.1.6.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.5.1.6-.1l.6-.8c.2-.2.4-.2.6-.1l1.7.8c.3.2.5.3.5.4.1.1.1.6-.1 1.2Z"/></svg></button>
      <button class="iconbtn fav ${fav?'on':''}" onclick="favoritar('${c.id}')" title="Favoritar">${fav?'★':'☆'}</button>
      <button class="iconbtn up ${votou?'on':''}" onclick="util('${c.id}')" title="Marcar como útil">👍</button>
      ${podeEditar?`<button class="iconbtn" onclick="abrirEditor('${c.id}')" title="Editar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>`:''}
      <button class="iconbtn" onclick="duplicar('${c.id}')" title="Duplicar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg></button>
    </div></div>`;
}

/* ======================= AÇÕES (gravam no banco) ======================= */
async function copiar(id,btn){
  const c=CARDS.find(x=>x.id===id); const txt=preencher(c.texto);
  try{ await navigator.clipboard.writeText(txt); }catch(e){}
  c.usos++; btn.textContent='Copiado ✓'; btn.classList.add('done');
  setTimeout(()=>{btn.textContent='Copiar mensagem';btn.classList.remove('done');},1400);
  toast('Mensagem copiada com os dados preenchidos');
  const meta=btn.closest('.card').querySelector('.card-meta span'); if(meta) meta.textContent='⚡ '+c.usos+' usos';
  sb.rpc('registrar_uso',{p_card:id,p_usuario:ME.id,p_canal:'copia'});
}
async function zap(id){
  const c=CARDS.find(x=>x.id===id); c.usos++;
  window.open('https://wa.me/?text='+encodeURIComponent(preencher(c.texto)),'_blank');
  toast('Abrindo no WhatsApp…');
  sb.rpc('registrar_uso',{p_card:id,p_usuario:ME.id,p_canal:'whatsapp'});
  render();
}
async function favoritar(id){
  if(FAVS.has(id)){ FAVS.delete(id); await sb.from('card_favoritos').delete().eq('usuario_id',ME.id).eq('card_id',id); toast('Removido dos favoritos'); }
  else { FAVS.add(id); await sb.from('card_favoritos').insert({usuario_id:ME.id,card_id:id}); toast('Adicionado aos favoritos'); }
  montarNav(); render();
}
async function util(id){
  const {data,error}=await sb.rpc('votar_util',{p_card:id,p_usuario:ME.id});
  if(error){ toast('Não foi possível votar'); return; }
  const c=CARDS.find(x=>x.id===id); if(c) c.uteis=data;
  VOTES.has(id)?VOTES.delete(id):VOTES.add(id);
  toast('Obrigado! Isso ajuda a destacar os melhores cards'); render();
}
async function duplicar(id){
  const c=CARDS.find(x=>x.id===id);
  const {data,error}=await sb.from('cards').insert({categoria_id:c.cat,titulo:c.titulo+' (cópia)',texto:c.texto,
    palavras_chave:c.kw,sensivel:c.sensivel,origem:'sugestao',criado_por:ME.id}).select().single();
  if(error){ toast('Erro ao duplicar'); return; }
  await carregarCards(); montarNav(); abrirEditor(data.id);
}

/* ======================= EDITOR ======================= */
let editId=null;
function abrirEditor(id){
  editId=id||null;
  const c=id?CARDS.find(x=>x.id===id):{titulo:'',cat:view.tipo==='cat'?view.id:(CATEGORIAS[0]?CATEGORIAS[0].id:'ATD'),texto:'',kw:'',sensivel:false};
  const ehNovo=!id;
  const varBtns=VARIAVEIS.map(v=>`<button type="button" class="varchip" onclick="inserirVar('${v.chave}')">+ ${v.chave}</button>`).join('');
  const opts=CATEGORIAS.map(k=>`<option value="${k.id}" ${k.id===c.cat?'selected':''}>${k.nome}</option>`).join('');
  const podeExcluir=!ehNovo && (c.origem!=='oficial' || ME.papel==='administrador');
  const podePublicar=!ehNovo && c.origem==='sugestao' && ME.papel==='administrador';
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ov';
  ov.innerHTML=`<div class="modal">
    <div class="modal-h"><h2>${ehNovo?'Novo card':'Editar card'}</h2><button class="x" onclick="fecharEditor()">×</button></div>
    <div class="modal-b">
      <label class="flbl">Título</label>
      <input type="text" id="eTit" value="${esc(c.titulo)}" placeholder="Ex.: Confirmação de agendamento">
      <label class="flbl">Categoria</label><select id="eCat">${opts}</select>
      <label class="flbl">Mensagem</label>
      <div class="varbar">${varBtns}</div>
      <textarea id="eTxt" placeholder="Escreva o texto. Use os botões acima para inserir variáveis como [NOME DO PACIENTE].">${esc(c.texto)}</textarea>
      <label class="flbl">Palavras-chave (para a busca)</label>
      <input type="text" id="eKw" value="${esc(c.kw||'')}" placeholder="agendar, confirmar, horario…">
      <label class="chkrow"><input type="checkbox" id="eSens" ${c.sensivel?'checked':''}> Marcar como assunto sensível (urgência emocional)</label>
    </div>
    <div class="modal-f">
      ${podeExcluir?'<button class="btn btn-danger" onclick="excluir()">Excluir</button>':''}
      ${podePublicar?'<button class="btn" onclick="publicar()">Publicar como oficial</button>':''}
      <button class="btn" onclick="fecharEditor()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvar()">${ehNovo?'Criar card':'Salvar alterações'}</button>
    </div></div>`;
  $('app').appendChild(ov); setTimeout(()=>$('eTit').focus(),50);
}
function inserirVar(v){ const ta=$('eTxt'),s=ta.selectionStart,e=ta.selectionEnd; ta.value=ta.value.slice(0,s)+'['+v+']'+ta.value.slice(e); ta.focus(); ta.selectionStart=ta.selectionEnd=s+v.length+2; }
function fecharEditor(){ const ov=$('ov'); if(ov)ov.remove(); editId=null; }
async function salvar(){
  const tit=$('eTit').value.trim(); if(!tit){ toast('Dê um título ao card'); $('eTit').focus(); return; }
  const dados={titulo:tit,categoria_id:$('eCat').value,texto:$('eTxt').value,palavras_chave:$('eKw').value,sensivel:$('eSens').checked};
  if(editId){
    const {error}=await sb.from('cards').update({...dados,atualizado_por:ME.id}).eq('id',editId);
    if(error){ toast('Erro ao salvar'); return; } toast('Card atualizado');
  }else{
    const origem=ME.papel==='administrador'?'oficial':'sugestao';
    const {error}=await sb.from('cards').insert({...dados,origem,criado_por:ME.id});
    if(error){ toast('Erro ao criar'); return; }
    toast(origem==='oficial'?'Card criado (oficial)':'Card criado — enviado como sugestão para o administrador aprovar');
  }
  fecharEditor(); await carregarCards(); montarNav(); render();
}
async function excluir(){ if(!editId) return; const {error}=await sb.from('cards').delete().eq('id',editId); if(error){toast('Erro ao excluir');return;} fecharEditor(); await carregarCards(); montarNav(); render(); toast('Card excluído'); }
async function publicar(){ const {error}=await sb.from('cards').update({origem:'oficial',atualizado_por:ME.id}).eq('id',editId); if(error){toast('Erro ao publicar');return;} fecharEditor(); await carregarCards(); montarNav(); render(); toast('Card publicado como oficial'); }
async function desligarAviso(){ if(AVISO){ await sb.from('avisos').update({ativo:false}).eq('id',AVISO.id); AVISO=null; } render(); }

/* ======================= USUÁRIOS (só Administrador) ======================= */
function renderUsuarios(){
  $('crumb').textContent='Usuários'; $('avisoWrap').innerHTML='';
  $('contagem').textContent = USUARIOS.length+' usuários · '+USUARIOS.filter(u=>u.ativo!==false).length+' ativos';
  const linhas=USUARIOS.map(u=>{
    const ini=u.nome.split(' ').map(p=>p[0]).slice(0,2).join(''); const adm=u.papel==='administrador';
    const ativo=u.ativo!==false; const souEu=ME.id===u.id;
    return `<div class="urow ${ativo?'':'off'}">
      <span class="avatar" style="background:${u.cor}">${ini}</span>
      <span class="nome">${esc(u.nome)}${souEu?' <span style="color:var(--muted);font-weight:400">(você)</span>':''}</span>
      <span class="pbadge ${adm?'adm':'cc'}">${labelPapel(u.papel)}</span>
      <span class="status ${ativo?'':'inativo'}">${ativo?'● Ativo':'○ Desativado'}</span>
      <span class="uacts">
        <button class="iconbtn" title="Editar" onclick="abrirUsuario('${u.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
        <button class="iconbtn" title="${ativo?'Desativar':'Reativar'}" onclick="toggleAtivo('${u.id}')">${ativo?'⏻':'↺'}</button>
        <button class="iconbtn" title="Apagar" onclick="apagarUsuario('${u.id}')" ${souEu?'disabled style="opacity:.4;cursor:not-allowed"':''}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>
      </span></div>`;
  }).join('');
  $('grid').innerHTML = `<div class="upanel">
    <div class="uhead"><b>Equipe</b>
      <button class="btn btn-primary" onclick="abrirUsuario()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg> Adicionar usuário</button></div>
    ${linhas}
    <div class="uhint">Desativar mantém o histórico da pessoa (cards e usos). Apagar só é permitido quando não há nada vinculado — caso contrário, o sistema sugere desativar.</div>
  </div>`;
}
let editUserId=null;
function abrirUsuario(id){
  editUserId=id||null;
  const u=id?USUARIOS.find(x=>x.id===id):{nome:'',papel:'callcenter'};
  const ehNovo=!id;
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ovU';
  ov.innerHTML=`<div class="modal" style="max-width:440px">
    <div class="modal-h"><h2>${ehNovo?'Adicionar usuário':'Editar usuário'}</h2><button class="x" onclick="fecharUsuario()">×</button></div>
    <div class="modal-b">
      <label class="flbl">Nome</label>
      <input type="text" id="uNome" value="${esc(u.nome)}" placeholder="Nome do atendente">
      <label class="flbl">Perfil</label>
      <select id="uPapel">
        <option value="callcenter" ${u.papel==='callcenter'?'selected':''}>Call-center — usa os cards e cria sugestões</option>
        <option value="administrador" ${u.papel==='administrador'?'selected':''}>Administrador — gerencia equipe e publica cards</option>
      </select></div>
    <div class="modal-f">
      <button class="btn" onclick="fecharUsuario()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarUsuario()">${ehNovo?'Adicionar':'Salvar'}</button>
    </div></div>`;
  $('app').appendChild(ov); setTimeout(()=>$('uNome').focus(),50);
}
function fecharUsuario(){ const ov=$('ovU'); if(ov)ov.remove(); editUserId=null; }
async function salvarUsuario(){
  const nome=$('uNome').value.trim(); if(!nome){ toast('Informe o nome'); $('uNome').focus(); return; }
  const papel=$('uPapel').value;
  if(editUserId){
    const {error}=await sb.from('usuarios').update({nome,papel}).eq('id',editUserId);
    if(error){toast('Erro ao salvar');return;}
    if(ME.id===editUserId){ ME.papel=papel; $('mePapel').textContent=labelPapel(papel); }
    toast('Usuário atualizado');
  }else{
    const cor=PALETA[USUARIOS.length%PALETA.length];
    const {error}=await sb.from('usuarios').insert({nome,papel,cor,ativo:true});
    if(error){toast('Erro ao adicionar');return;}
    toast('Usuário adicionado — já aparece na tela de login');
  }
  fecharUsuario(); await carregarUsuarios(); montarNav(); renderUsuarios();
}
async function toggleAtivo(id){
  const u=USUARIOS.find(x=>x.id===id);
  if(ME.id===u.id){ toast('Você não pode desativar a si mesmo'); return; }
  const novo=!(u.ativo!==false);
  const {error}=await sb.from('usuarios').update({ativo:novo}).eq('id',id);
  if(error){toast('Erro');return;}
  toast(novo?'Usuário reativado':'Usuário desativado (some do login, histórico preservado)');
  await carregarUsuarios(); montarNav(); renderUsuarios();
}
async function apagarUsuario(id){
  const u=USUARIOS.find(x=>x.id===id);
  if(ME.id===u.id){ toast('Você não pode apagar a si mesmo'); return; }
  const {error}=await sb.rpc('apagar_usuario',{p_id:id});
  if(error){
    if((error.message||'').includes('VINCULO')) toast(`${u.nome} tem cards vinculados. Desative em vez de apagar.`);
    else toast('Erro ao apagar');
    return;
  }
  await carregarUsuarios(); montarNav(); renderUsuarios(); toast('Usuário apagado');
}

/* ======================= INIT ======================= */
(async function init(){
  if(!configOK){
    $('userList').innerHTML = '<div style="grid-column:1/-1;text-align:left;color:#b23b3b;font-size:13.5px;line-height:1.5">'+
      '⚠ <b>Configuração pendente.</b> Abra este arquivo num editor e cole, no topo, a <b>URL</b> e a <b>chave anônima</b> do seu projeto Supabase (em <i>Project Settings → API</i>). Depois recarregue.</div>';
    return;
  }
  try{ await carregarUsuarios(); montarLogin(); }
  catch(e){ console.error(e); $('userList').innerHTML='<div style="grid-column:1/-1;color:#b23b3b;font-size:13.5px">Não consegui conectar ao banco. Confira a URL/chave e se o SQL foi executado.</div>'; }
})();
</script>
</body>
</html>
